<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Darkroom · 行動修圖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500&family=Noto+Sans+TC:wght@400;500;700;900&family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,700;1,900&family=Anton&family=Caveat:wght@400;700&family=Permanent+Marker&family=Shippori+Mincho:wght@400;700;900&family=Sawarabi+Mincho&family=Hina+Mincho&family=Yuji+Syuku&family=Klee+One:wght@400;600&family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Serif+JP:wght@400;700;900&family=Dancing+Script:wght@500;700&family=Great+Vibes&family=Pacifico&family=Sacramento&family=Allura&family=Kaushan+Script&family=Satisfy&family=Shrikhand&family=Alfa+Slab+One&family=Black+Ops+One&family=Russo+One&family=Archivo+Black&family=Bungee&family=Bungee+Shade&family=Monoton&family=Audiowide&family=Press+Start+2P&family=Rubik+Mono+One&family=DM+Serif+Display:ital@0;1&family=Abril+Fatface&family=Cinzel:wght@700;900&family=Yeseva+One&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --bg-2: #0d0d0d;
    --panel: #1a1a1a;
    --panel-2: #232323;
    --line: #2a2a2a;
    --ink: #ffffff;
    --ink-dim: #a8a8a8;
    --ink-mute: #6a6a6a;
    --accent: #4a9eff;
    --accent-2: #ffd54a;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans TC', 'Inter', -apple-system, system-ui, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  .app {
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ============ TOP BAR ============ */
  .topbar {
    height: 46px;
    padding-top: var(--safe-top);
    height: calc(46px + var(--safe-top));
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-left: 12px;
    padding-right: 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
    z-index: 10;
  }

  .top-left, .top-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .icon-btn {
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    color: var(--ink);
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.15s;
  }
  .icon-btn:active { background: var(--panel); }
  .icon-btn svg { width: 22px; height: 22px; }

  .icon-btn.primary {
    color: var(--accent);
  }

  .top-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--ink);
  }
  .top-title .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-mute);
    display: block;
    text-align: center;
    margin-top: 1px;
    letter-spacing: 0.15em;
  }

  /* ============ PHOTO AREA ============ */
  .photo-stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: var(--bg);
    overflow: hidden;
    min-height: 0;
    padding: 8px;
  }

  .photo-wrap {
    max-width: 100%;
    max-height: 100%;
    position: relative;
    display: none;
  }

  #photoCanvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
  }

  /* upload */
  .upload-zone {
    text-align: center;
    padding: 40px 30px;
  }
  .upload-icon-circle {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: 1.5px dashed var(--ink-mute);
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .upload-icon-circle svg {
    width: 36px;
    height: 36px;
    stroke: var(--ink-dim);
  }
  .upload-text {
    font-size: 17px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--ink);
  }
  .upload-hint {
    font-size: 12px;
    color: var(--ink-mute);
    letter-spacing: 0.05em;
  }
  .upload-btn {
    margin-top: 24px;
    padding: 12px 32px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  #fileInput { display: none; }

  /* compare button (long-press to show original) */
  .compare-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--ink);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 5;
  }
  .compare-btn.visible { display: flex; }
  .compare-btn svg { width: 16px; height: 16px; }
  .compare-btn:active, .compare-btn.holding {
    background: var(--accent);
  }

  .filter-tag-overlay {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 6px 12px;
    border-radius: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--accent-2);
    display: none;
  }
  .filter-tag-overlay.visible { display: block; }

  /* ============ BOTTOM PANEL ============ */
  .bottom-panel {
    background: var(--bg-2);
    border-top: 1px solid var(--line);
    flex-shrink: 0;
    padding-bottom: var(--safe-bottom);
    transition: transform 0.3s ease;
  }

  /* tab content - 限制底部面板高度,讓照片成為主角 */
  .tab-content {
    display: none;
    overflow: hidden;
  }
  .tab-content.active {
    display: block;
  }

  /* === FILTERS TAB === */
  .filter-section-tabs {
    display: flex;
    gap: 20px;
    padding: 8px 16px 0;
    border-bottom: 1px solid var(--line);
  }
  .filter-section-tab {
    background: none;
    border: none;
    color: var(--ink-mute);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 0;
    cursor: pointer;
    position: relative;
  }
  .filter-section-tab.active {
    color: var(--ink);
  }
  .filter-section-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent);
  }

  .filter-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 10px 16px 12px;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .filter-scroll::-webkit-scrollbar { display: none; }

  .filter-card {
    flex-shrink: 0;
    scroll-snap-align: start;
    width: 64px;
    cursor: pointer;
    position: relative;
  }

  .filter-thumb {
    width: 64px;
    height: 64px;
    border-radius: 10px;
    background: var(--panel);
    border: 2px solid transparent;
    overflow: hidden;
    position: relative;
    transition: border-color 0.2s;
  }

  .filter-card.active .filter-thumb {
    border-color: var(--accent);
  }

  .filter-thumb canvas, .filter-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .filter-thumb-placeholder {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-mute);
    letter-spacing: 0.1em;
  }

  .filter-name {
    text-align: center;
    font-size: 10.5px;
    margin-top: 4px;
    color: var(--ink-dim);
    line-height: 1.2;
    height: 22px;
    overflow: hidden;
  }
  .filter-card.active .filter-name {
    color: var(--ink);
    font-weight: 500;
  }

  /* === FILTER INTENSITY SLIDER === */
  .filter-intensity {
    padding: 4px 24px 10px;
    border-top: 1px solid var(--line);
    display: none;
    animation: slideDown 0.2s ease;
  }
  .filter-intensity.visible {
    display: block;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .intensity-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 6px 0 8px;
  }
  .intensity-label {
    font-size: 12px;
    color: var(--ink-dim);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .intensity-label .filter-name-inline {
    color: var(--accent-2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
  }
  .intensity-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
  }

  .intensity-slider-wrap {
    position: relative;
    height: 28px;
    display: flex;
    align-items: center;
  }

  input[type=range].intensity-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--fill, 100%), var(--line) var(--fill, 100%), var(--line) 100%);
    outline: none;
    margin: 0;
  }
  input[type=range].intensity-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    background: var(--ink);
    cursor: pointer;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  input[type=range].intensity-slider::-moz-range-thumb {
    width: 20px;
    height: 20px;
    background: var(--ink);
    cursor: pointer;
    border-radius: 50%;
    border: none;
  }

  /* === ADJUST TAB === */
  .adjust-tab-container {
    padding-bottom: 8px;
  }

  .adjust-category-bar {
    display: flex;
    gap: 0;
    padding: 8px 16px 0;
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
  }
  .adjust-category-bar::-webkit-scrollbar { display: none; }

  .adjust-cat {
    background: none;
    border: none;
    color: var(--ink-mute);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    cursor: pointer;
    position: relative;
    white-space: nowrap;
  }
  .adjust-cat.active { color: var(--ink); }
  .adjust-cat.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 14px;
    right: 14px;
    height: 2px;
    background: var(--accent);
  }

  .adjust-sliders {
    display: none;
    padding: 4px 0 6px;
  }
  .adjust-sliders.active { display: block; }

  /* sub-tabs render as a horizontal scroll of "pill" sliders, classic Lightroom mobile style */
  .pill-row {
    display: flex;
    gap: 0;
    overflow-x: auto;
    padding: 4px 16px;
    -webkit-overflow-scrolling: touch;
  }
  .pill-row::-webkit-scrollbar { display: none; }

  .pill-slider {
    flex-shrink: 0;
    width: 64px;
    text-align: center;
    cursor: pointer;
    padding: 4px 0;
    border-radius: 8px;
  }
  .pill-slider.selected {
    background: var(--panel);
  }
  .pill-slider .pill-icon {
    width: 30px;
    height: 30px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-dim);
  }
  .pill-slider.selected .pill-icon { color: var(--accent); }
  .pill-slider.modified .pill-icon { color: var(--accent-2); }
  .pill-slider .pill-icon svg { width: 20px; height: 20px; }
  .pill-slider .pill-label {
    font-size: 10.5px;
    color: var(--ink-dim);
    margin-top: 1px;
  }
  .pill-slider.selected .pill-label { color: var(--ink); }
  .pill-slider .pill-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-mute);
    margin-top: 0;
    height: 10px;
  }
  .pill-slider.modified .pill-val { color: var(--accent-2); }

  /* large slider for the currently-selected adjustment */
  .big-slider-area {
    padding: 8px 24px 10px;
    border-top: 1px solid var(--line);
    margin-top: 2px;
  }

  .big-slider-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .big-slider-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
  }
  .big-slider-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    min-width: 40px;
    text-align: right;
  }

  .slider-wrap {
    position: relative;
    height: 28px;
    display: flex;
    align-items: center;
  }

  input[type=range].big-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: var(--line);
    outline: none;
    margin: 0;
    position: relative;
    z-index: 2;
  }
  input[type=range].big-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    background: var(--ink);
    cursor: pointer;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  input[type=range].big-slider::-moz-range-thumb {
    width: 22px;
    height: 22px;
    background: var(--ink);
    cursor: pointer;
    border-radius: 50%;
    border: none;
  }

  .slider-center-tick {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 2px;
    height: 10px;
    background: var(--ink-mute);
    transform: translate(-50%, -50%);
    z-index: 1;
    border-radius: 2px;
  }

  /* ============ BOTTOM TAB BAR ============ */
  .tabbar {
    height: 48px;
    background: var(--bg);
    border-top: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding-bottom: var(--safe-bottom);
    flex-shrink: 0;
  }

  .tab-btn {
    background: none;
    border: none;
    color: var(--ink-mute);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    cursor: pointer;
    padding: 4px 12px;
    flex: 1;
    min-width: 0;
  }
  .tab-btn svg { width: 20px; height: 20px; }
  .tab-btn span {
    font-size: 10.5px;
    font-weight: 500;
  }
  .tab-btn.active { color: var(--accent); }

  /* ============ TOAST ============ */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.95);
    color: #000;
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(-6px);
  }

  /* processing indicator */
  .processing-dot {
    position: absolute;
    bottom: 12px;
    right: 12px;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .processing-dot.show {
    opacity: 1;
    animation: pulse 0.8s ease infinite;
  }
  @keyframes pulse {
    50% { transform: scale(1.6); opacity: 0.4; }
  }

  /* ============ MODAL ============ */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 50;
    display: none;
    align-items: flex-end;
  }
  .modal-backdrop.show { display: flex; }
  .modal-sheet {
    width: 100%;
    background: var(--panel);
    border-radius: 16px 16px 0 0;
    padding: 20px 20px calc(20px + var(--safe-bottom));
    transform: translateY(100%);
    transition: transform 0.25s ease;
  }
  .modal-backdrop.show .modal-sheet {
    transform: translateY(0);
  }
  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--ink-mute);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .modal-title {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 16px;
    text-align: center;
  }
  .modal-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .modal-btn {
    padding: 14px;
    background: var(--panel-2);
    border: none;
    color: var(--ink);
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    padding-left: 20px;
  }
  .modal-btn.danger { color: #ff6b6b; }
  .modal-btn:active { background: var(--line); }

  /* ============ EXPORT SHEET ============ */
  .export-sheet {
    width: 100%;
    background: var(--panel);
    border-radius: 18px 18px 0 0;
    padding: 16px 20px calc(20px + var(--safe-bottom));
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 92vh;
    overflow-y: auto;
  }
  .modal-backdrop.show .export-sheet {
    transform: translateY(0);
  }

  .export-preview {
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
    background: #000;
    position: relative;
  }
  .export-preview img {
    width: 100%;
    height: auto;
    display: block;
    -webkit-touch-callout: default;  /* 允許長按 */
    touch-callout: default;
    user-select: auto;
    -webkit-user-select: auto;
    pointer-events: auto;
  }

  .export-tip {
    background: rgba(74, 158, 255, 0.1);
    border: 1px solid rgba(74, 158, 255, 0.3);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 14px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .export-tip svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    margin-top: 1px;
    color: var(--accent);
  }
  .export-tip-text {
    font-size: 12.5px;
    line-height: 1.5;
    color: var(--ink);
  }
  .export-tip-text strong {
    color: var(--accent);
    font-weight: 600;
  }

  .export-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .export-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--panel-2);
    border: none;
    color: var(--ink);
    border-radius: 12px;
    font-size: 14.5px;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    width: 100%;
    transition: background 0.15s;
  }
  .export-btn:active { background: var(--line); }

  .export-btn.primary {
    background: var(--accent);
    color: white;
  }
  .export-btn.primary:active { background: #3b8df0; }

  .export-btn svg {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }
  .export-btn-content {
    flex: 1;
    min-width: 0;
  }
  .export-btn-title {
    font-size: 14.5px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .export-btn-desc {
    font-size: 11.5px;
    opacity: 0.7;
    font-weight: 400;
  }

  .export-close {
    margin-top: 8px;
    background: transparent;
    border: 1px solid var(--line);
    padding: 12px;
    color: var(--ink-dim);
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    width: 100%;
  }

  /* ============================================================
     CROP & TEXT TAB
     ============================================================ */

  /* 裁切 / 文字 共用的二級 tab */
  .crop-text-tabs {
    display: flex;
    gap: 20px;
    padding: 8px 16px 0;
    border-bottom: 1px solid var(--line);
  }
  .crop-text-tab {
    background: none;
    border: none;
    color: var(--ink-mute);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 0;
    cursor: pointer;
    position: relative;
  }
  .crop-text-tab.active { color: var(--ink); }
  .crop-text-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }

  .crop-text-section {
    display: none;
  }
  .crop-text-section.active {
    display: block;
  }

  /* 裁切比例選擇 */
  .ratio-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 10px 16px;
    -webkit-overflow-scrolling: touch;
  }
  .ratio-row::-webkit-scrollbar { display: none; }

  .ratio-btn {
    flex-shrink: 0;
    background: var(--panel-2);
    border: 1.5px solid transparent;
    color: var(--ink-dim);
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 64px;
  }
  .ratio-btn.active {
    border-color: var(--accent);
    color: var(--ink);
    background: rgba(74,158,255,0.1);
  }
  .ratio-icon {
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ratio-icon-box {
    border: 1.5px solid currentColor;
    border-radius: 3px;
  }
  .ratio-label {
    font-size: 10px;
    font-weight: 500;
    line-height: 1;
  }
  .ratio-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8.5px;
    color: var(--ink-mute);
    line-height: 1;
  }
  .ratio-btn.active .ratio-sub { color: var(--accent); }

  .crop-actions {
    display: flex;
    gap: 8px;
    padding: 4px 16px 10px;
  }
  .crop-action-btn {
    flex: 1;
    padding: 9px 8px;
    background: var(--panel-2);
    border: none;
    color: var(--ink);
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .crop-action-btn:active { background: var(--line); }
  .crop-action-btn svg { width: 14px; height: 14px; }
  .crop-action-btn.primary {
    background: var(--accent);
    color: white;
  }

  /* 裁切覆蓋層 (放在 photo-wrap 內) */
  .crop-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: none;
  }
  .crop-overlay.active { display: block; }

  .crop-mask {
    position: absolute;
    background: rgba(0,0,0,0.55);
    pointer-events: none;
  }

  .crop-frame {
    position: absolute;
    border: 1px solid rgba(255,255,255,0.95);
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.4);
    pointer-events: auto;
    cursor: move;
    touch-action: none;
  }

  /* 三分格線 */
  .crop-frame::before, .crop-frame::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.35);
    pointer-events: none;
  }
  .crop-frame::before {
    /* 水平兩條 */
    left: 0; right: 0;
    top: 33.333%;
    height: 1px;
    box-shadow: 0 33.333% 0 0 rgba(255,255,255,0.35);
  }
  .crop-frame::after {
    /* 垂直兩條 */
    top: 0; bottom: 0;
    left: 33.333%;
    width: 1px;
    box-shadow: 33.333% 0 0 0 rgba(255,255,255,0.35);
  }

  .crop-handle {
    position: absolute;
    width: 24px;
    height: 24px;
    pointer-events: auto;
    touch-action: none;
  }
  .crop-handle::after {
    content: '';
    position: absolute;
    background: #fff;
  }
  /* 四個角 */
  .crop-handle.tl { top: -12px; left: -12px; cursor: nw-resize; }
  .crop-handle.tr { top: -12px; right: -12px; cursor: ne-resize; }
  .crop-handle.bl { bottom: -12px; left: -12px; cursor: sw-resize; }
  .crop-handle.br { bottom: -12px; right: -12px; cursor: se-resize; }
  .crop-handle.tl::after, .crop-handle.tr::after,
  .crop-handle.bl::after, .crop-handle.br::after {
    width: 14px;
    height: 14px;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    border-radius: 2px;
  }
  .crop-handle.tl::after { box-shadow: -1px -1px 0 1px rgba(0,0,0,0.4); }
  .crop-handle.tr::after { box-shadow:  1px -1px 0 1px rgba(0,0,0,0.4); }
  .crop-handle.bl::after { box-shadow: -1px  1px 0 1px rgba(0,0,0,0.4); }
  .crop-handle.br::after { box-shadow:  1px  1px 0 1px rgba(0,0,0,0.4); }

  /* ============ TEXT (字體) ============ */
  .text-input-row {
    padding: 10px 16px 6px;
  }
  .text-input {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .text-input:focus { border-color: var(--accent); }

  /* 字體分類 tab */
  .font-cat-row {
    display: flex;
    gap: 6px;
    padding: 6px 16px 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .font-cat-row::-webkit-scrollbar { display: none; }
  .font-cat-btn {
    flex-shrink: 0;
    background: var(--panel-2);
    border: 1px solid transparent;
    color: var(--ink-dim);
    padding: 5px 12px;
    border-radius: 14px;
    font-size: 11.5px;
    cursor: pointer;
    white-space: nowrap;
  }
  .font-cat-btn.active {
    background: rgba(74,158,255,0.15);
    color: var(--accent);
    border-color: var(--accent);
  }

  .font-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 6px 16px;
    -webkit-overflow-scrolling: touch;
  }
  .font-row::-webkit-scrollbar { display: none; }

  .font-card {
    flex-shrink: 0;
    width: 76px;
    height: 76px;
    background: var(--panel-2);
    border: 1.5px solid transparent;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4px;
    text-align: center;
  }
  .font-card.active {
    border-color: var(--accent);
    background: rgba(74,158,255,0.08);
  }
  .font-preview {
    font-size: 22px;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 4px;
  }

  /* ============================================================
     特效字體樣式 - Y2K 鉻金屬、3D 氣球、復古描邊等
     用 CSS 模擬,套在文字 DOM 元素跟最終 canvas 上
     ============================================================ */

  /* Y2K 鉻金屬 - 藍灰漸層 + 內外光暈 */
  .fx-chrome {
    background: linear-gradient(180deg, #e8f4ff 0%, #7fb8e8 25%, #2a5a8a 50%, #1a3a5a 51%, #5a8ec0 75%, #c8e0f0 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow:
      0 1px 0 rgba(255,255,255,0.5),
      0 -1px 0 rgba(0,0,0,0.3),
      2px 4px 8px rgba(0,30,80,0.4);
    filter: drop-shadow(0 0 6px rgba(120,200,255,0.5));
  }

  /* 銀色金屬 - 經典科幻款 */
  .fx-silver {
    background: linear-gradient(180deg, #ffffff 0%, #c0c0c0 35%, #6b6b6b 50%, #2a2a2a 51%, #6b6b6b 65%, #d4d4d4 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5));
  }

  /* 金色金屬 - 奢華感 */
  .fx-gold {
    background: linear-gradient(180deg, #fff5d4 0%, #f4d168 30%, #b8841f 55%, #6a4a10 70%, #b8841f 85%, #f4d168 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
  }

  /* 3D 氣球字 - 粉色 OVO 風 */
  .fx-bubble-pink {
    color: #ffb8c8;
    text-shadow:
      -1px -1px 0 #ff4d7a,
      1px -1px 0 #ff4d7a,
      -1px 1px 0 #ff4d7a,
      1px 1px 0 #ff4d7a,
      2px 2px 0 #d62059,
      3px 3px 0 #d62059,
      4px 4px 0 #d62059,
      5px 5px 0 #b51a4a,
      6px 6px 8px rgba(180,20,70,0.3);
  }

  /* 3D 立體字 - 紅黑款 */
  .fx-3d-red {
    color: #ff3838;
    text-shadow:
      2px 2px 0 #000,
      3px 3px 0 #000,
      4px 4px 0 #000,
      5px 5px 0 #000,
      6px 6px 12px rgba(0,0,0,0.5);
  }

  /* 復古描邊 - 只有外框 */
  .fx-outline {
    color: transparent;
    -webkit-text-stroke: 2px currentColor;
  }

  /* 雙色描邊 - 街頭風 */
  .fx-outline-double {
    color: #fff;
    text-shadow:
      -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000,
      -4px -4px 0 #ff4d4d, 4px -4px 0 #ff4d4d, -4px 4px 0 #ff4d4d, 4px 4px 0 #ff4d4d;
  }

  /* 螢光發光 - 賽博龐克 */
  .fx-neon {
    color: #fff;
    text-shadow:
      0 0 4px #fff,
      0 0 8px #ff00de,
      0 0 16px #ff00de,
      0 0 24px #ff00de,
      0 0 32px #ff00de;
  }

  /* 螢光綠 - 駭客風 */
  .fx-neon-green {
    color: #d0ffd0;
    text-shadow:
      0 0 4px #fff,
      0 0 8px #00ff88,
      0 0 16px #00ff88,
      0 0 24px #00cc66;
  }

  /* 復古條紋 - 80年代 */
  .fx-retro-stripe {
    background: linear-gradient(180deg,
      #ff006e 0%, #ff006e 20%,
      #ff9500 20%, #ff9500 40%,
      #ffd60a 40%, #ffd60a 60%,
      #06d6a0 60%, #06d6a0 80%,
      #118ab2 80%, #118ab2 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.6));
  }

  /* 火焰漸層 */
  .fx-fire {
    background: linear-gradient(180deg, #fff700 0%, #ff9500 40%, #ff3838 80%, #8b0000 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 8px rgba(255,100,0,0.6));
  }

  /* 全像彩虹 - Y2K */
  .fx-holo {
    background: linear-gradient(135deg, #ff00de 0%, #00d4ff 25%, #00ff88 50%, #ffd60a 75%, #ff00de 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 4px rgba(255,0,222,0.5));
  }

  /* 字體分組標籤 */
  .font-card-fx-label {
    position: absolute;
    top: 2px;
    right: 2px;
    background: rgba(255,200,40,0.95);
    color: #000;
    font-size: 8px;
    font-weight: 700;
    padding: 1px 3px;
    border-radius: 3px;
    line-height: 1;
  }
  .font-card { position: relative; }
  .font-name {
    font-size: 9.5px;
    color: var(--ink-dim);
    line-height: 1.1;
  }
  .font-card.active .font-name { color: var(--accent); }

  /* 文字工具列(顏色 + 大小 + 加文字按鈕) */
  .text-tools {
    display: flex;
    gap: 8px;
    padding: 4px 16px 10px;
    align-items: center;
  }
  .color-swatches {
    display: flex;
    gap: 6px;
    flex: 1;
  }
  .color-swatch {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.1s;
  }
  .color-swatch.active {
    border-color: var(--accent);
    transform: scale(1.1);
  }

  .add-text-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .add-text-btn svg { width: 14px; height: 14px; }

  /* 文字物件覆蓋層 (覆蓋在 photo-wrap 上) */
  .text-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .text-obj {
    position: absolute;
    pointer-events: auto;
    cursor: move;
    user-select: none;
    -webkit-user-select: none;
    padding: 4px 8px;
    white-space: nowrap;
    touch-action: none;
    transform-origin: top left;
  }
  .text-obj.selected {
    outline: 1.5px dashed var(--accent);
    outline-offset: 2px;
  }
  .text-obj .text-content {
    display: inline-block;
  }
  .text-delete {
    position: absolute;
    top: -10px;
    right: -10px;
    width: 22px;
    height: 22px;
    background: #ff4d4d;
    color: white;
    border-radius: 50%;
    border: 2px solid #000;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    font-weight: 700;
  }
  .text-obj.selected .text-delete { display: flex; }

  /* ============================================================
     RESPONSIVE - iPad / 平板 / 較寬螢幕
     避免照片區被等比例撐太大,造成版面失衡
     策略:限制內容最大寬度並置中,左右留黑邊像專業修圖 App
     ============================================================ */

  /* iPad 直立 / 較寬手機橫式 (寬度 600px 以上) */
  @media (min-width: 600px) {
    .photo-stage {
      padding: 20px;
    }

    /* 限制照片最大尺寸,讓周圍留白 */
    #photoCanvas {
      max-width: min(100%, 680px);
      max-height: 100%;
      border-radius: 4px;
    }

    /* 上方 bar 微調 */
    .topbar {
      padding-left: 24px;
      padding-right: 24px;
    }

    /* 底部面板內容置中、限制最大寬度 */
    .filter-scroll,
    .pill-row,
    .filter-section-tabs,
    .adjust-category-bar,
    .filter-intensity,
    .big-slider-area {
      max-width: 680px;
      margin-left: auto;
      margin-right: auto;
    }

    /* tabbar 也置中,看起來更平衡 */
    .tabbar {
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    /* tab-content max-height 增加一點,避免內容擠壓 */
    .tab-content {
      max-height: 42vh;
    }
  }

  /* 更寬螢幕 (900px 以上) - 桌面或 iPad 橫式 */
  @media (min-width: 900px) {
    .photo-stage {
      padding: 32px;
    }

    #photoCanvas {
      max-width: min(100%, 820px);
    }

    .tab-content {
      max-height: 320px;
    }

    /* 內容區更寬一點 */
    .filter-scroll,
    .pill-row,
    .filter-section-tabs,
    .adjust-category-bar,
    .filter-intensity,
    .big-slider-area {
      max-width: 760px;
    }
  }
</style>
</head>
<body>

<div class="app">

  <!-- ============ TOP BAR ============ -->
  <header class="topbar">
    <div class="top-left">
      <button class="icon-btn" id="moreBtn" aria-label="更多">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
      </button>
    </div>
    <div class="top-title">
      DARKROOM
      <span class="meta" id="topMeta">未載入照片</span>
    </div>
    <div class="top-right">
      <button class="icon-btn" id="resetBtn" aria-label="重置">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
      </button>
      <button class="icon-btn primary" id="shareBtn" aria-label="輸出">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
    </div>
  </header>

  <!-- ============ PHOTO STAGE ============ -->
  <main class="photo-stage" id="photoStage">

    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>
      </div>
      <div class="upload-text">點擊載入照片</div>
      <div class="upload-hint">JPG / PNG / HEIC</div>
      <button class="upload-btn" id="uploadBtnMain">選擇照片</button>
    </div>

    <div class="photo-wrap" id="photoWrap">
      <canvas id="photoCanvas"></canvas>
      <div class="text-overlay" id="textOverlay"></div>
      <div class="crop-overlay" id="cropOverlay">
        <div class="crop-mask" id="cropMaskTop"></div>
        <div class="crop-mask" id="cropMaskBottom"></div>
        <div class="crop-mask" id="cropMaskLeft"></div>
        <div class="crop-mask" id="cropMaskRight"></div>
        <div class="crop-frame" id="cropFrame">
          <div class="crop-handle tl" data-handle="tl"></div>
          <div class="crop-handle tr" data-handle="tr"></div>
          <div class="crop-handle bl" data-handle="bl"></div>
          <div class="crop-handle br" data-handle="br"></div>
        </div>
      </div>
      <div class="filter-tag-overlay" id="filterTag">FILTER: NONE</div>
      <button class="compare-btn" id="compareBtn" aria-label="長按對比原圖">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 2v20"/><path d="M2 12h20"/></svg>
      </button>
      <div class="processing-dot" id="procDot"></div>
    </div>

    <input type="file" id="fileInput" accept="image/*">
  </main>

  <!-- ============ BOTTOM PANEL ============ -->
  <section class="bottom-panel" id="bottomPanel">

    <!-- ===== FILTERS TAB ===== -->
    <div class="tab-content active" id="tab-filters">
      <div class="filter-section-tabs">
        <button class="filter-section-tab active" data-fsection="film">膠片</button>
        <button class="filter-section-tab" data-fsection="trend">流行</button>
      </div>

      <div class="filter-scroll" id="filterScrollFilm">
        <!-- generated by JS -->
      </div>
      <div class="filter-scroll" id="filterScrollTrend" style="display:none;">
        <!-- generated by JS -->
      </div>

      <!-- 濾鏡強度滑桿 -->
      <div class="filter-intensity" id="filterIntensity">
        <div class="intensity-head">
          <div class="intensity-label">
            <span>濾鏡強度</span>
            <span class="filter-name-inline" id="intensityFilterName">—</span>
          </div>
          <div class="intensity-value" id="intensityValue">100%</div>
        </div>
        <div class="intensity-slider-wrap">
          <input type="range" class="intensity-slider" id="intensitySlider" min="0" max="100" value="100" style="--fill: 100%;">
        </div>
      </div>
    </div>

    <!-- ===== ADJUST TAB ===== -->
    <div class="tab-content" id="tab-adjust">
      <div class="adjust-category-bar">
        <button class="adjust-cat active" data-cat="light">光線</button>
        <button class="adjust-cat" data-cat="color">色彩</button>
        <button class="adjust-cat" data-cat="effects">效果</button>
        <button class="adjust-cat" data-cat="detail">細節</button>
      </div>

      <!-- Light -->
      <div class="adjust-sliders active" data-cat="light">
        <div class="pill-row">
          <div class="pill-slider selected" data-slider="exposure">

<script>
// ============================================================

// ============================================================

// ============================================================
// FILE LOAD
// ============================================================
uploadZone.addEventListener('click', () => fileInput.click());
document.getElementById('uploadBtnMain').addEventListener('click', e => {
  e.stopPropagation();
  fileInput.click();
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadImage(e.target.files[0]);
});

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const maxSide = 1400;
      let w = img.width, h = img.height;
      if (w > maxSide || h > maxSide) {
        const s = maxSide / Math.max(w, h);
        w = Math.round(w * s);
        h = Math.round(h * s);
      }
      canvas.width = w;
      canvas.height = h;
      ctx.drawImage(img, 0, 0, w, h);
      state.image = img;
      state.originalImageData = ctx.getImageData(0, 0, w, h);

      // 縮圖數據（給濾鏡預覽用）
      const thumbCanvas = document.createElement('canvas');
      const tw = 76, th = 76;
      thumbCanvas.width = tw;
      thumbCanvas.height = th;
      const tctx = thumbCanvas.getContext('2d');
      // center crop
      const ratio = Math.max(tw / w, th / h);
      const sw = tw / ratio, sh = th / ratio;
      const sx = (w - sw) / 2, sy = (h - sh) / 2;
      tctx.drawImage(canvas, sx, sy, sw, sh, 0, 0, tw, th);
      state.thumbImageData = tctx.getImageData(0, 0, tw, th);

      uploadZone.style.display = 'none';
      photoWrap.style.display = 'block';
      compareBtn.classList.add('visible');
      topMeta.textContent = `${img.width}×${img.height}`;

      // 載入新照片時清掉之前的文字
      if (state.textObjects) {
        state.textObjects = [];
        state.selectedTextId = null;
        if (typeof renderTextOverlay === 'function') renderTextOverlay();
      }

      renderFilterThumbs('film');
      renderFilterThumbs('trend');
      applyAll();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ============================================================
// FILTER THUMBNAILS  (render previews with each filter applied)
// ============================================================
function renderFilterThumbs(section) {
  const container = document.getElementById(section === 'film' ? 'filterScrollFilm' : 'filterScrollTrend');
  container.innerHTML = '';
  filterMeta[section].forEach(f => {
    const card = document.createElement('div');
    card.className = 'filter-card';
    if (f.id === state.activeFilter) card.classList.add('active');
    card.dataset.filter = f.id;

    const thumb = document.createElement('div');
    thumb.className = 'filter-thumb';

    if (state.thumbImageData) {
      const tcanvas = document.createElement('canvas');
      tcanvas.width = 76;
      tcanvas.height = 76;
      const tctx = tcanvas.getContext('2d');
      const filteredData = applyFilterToImageData(state.thumbImageData, f.id, {}, 1.0);
      tctx.putImageData(filteredData, 0, 0);
      thumb.appendChild(tcanvas);
    } else {
      const ph = document.createElement('div');
      ph.className = 'filter-thumb-placeholder';
      ph.textContent = f.code;
      thumb.appendChild(ph);
    }

    const name = document.createElement('div');
    name.className = 'filter-name';
    name.textContent = f.name;

    card.appendChild(thumb);
    card.appendChild(name);

    card.addEventListener('click', () => {
      state.activeFilter = f.id;
      // 切換濾鏡時把強度重置為 100%
      state.filterIntensity = 1.0;
      const intensitySlider = document.getElementById('intensitySlider');
      intensitySlider.value = 100;
      intensitySlider.style.setProperty('--fill', '100%');
      document.getElementById('intensityValue').textContent = '100%';
      document.getElementById('intensityFilterName').textContent = f.code;

      document.querySelectorAll('.filter-card').forEach(c => c.classList.remove('active'));
      document.querySelectorAll(`.filter-card[data-filter="${f.id}"]`).forEach(c => c.classList.add('active'));
      filterTag.textContent = `FILTER · ${f.code === 'ORIG' ? 'NONE' : f.code}`;
      filterTag.classList.toggle('visible', f.id !== 'none');

      // 只在選了非「原始」濾鏡時顯示強度滑桿
      document.getElementById('filterIntensity').classList.toggle('visible', f.id !== 'none');

      applyAll();
    });

    container.appendChild(card);
  });
}

function selectPill(pill) {
  document.querySelectorAll(`.adjust-sliders.active .pill-slider`).forEach(p => p.classList.remove('selected'));
  pill.classList.add('selected');
  const sliderId = pill.dataset.slider;
  state.selectedSlider = sliderId;
  const meta = sliderMeta[sliderId];
  bigSliderTitle.textContent = meta.label;
  bigSlider.min = meta.min;
  bigSlider.max = meta.max;
  bigSlider.value = state.adjustments[sliderId];
  updateBigSliderValue();

  // toggle center tick visibility (only for symmetric sliders)
  const tick = document.querySelector('.slider-center-tick');
  tick.style.display = meta.min < 0 ? 'block' : 'none';
}

  pill.addEventListener('click', () => selectPill(pill));
});

// BIG SLIDER
// ============================================================
let sliderDebounce;
bigSlider.addEventListener('input', () => {
  const v = parseInt(bigSlider.value);
  state.adjustments[state.selectedSlider] = v;
  updateBigSliderValue();
  updatePillIndicators();
  clearTimeout(sliderDebounce);
  sliderDebounce = setTimeout(applyAll, 20);
});

function updateBigSliderValue() {
  const v = state.adjustments[state.selectedSlider];
  bigSliderValue.textContent = v > 0 ? `+${v}` : `${v}`;
  bigSliderValue.style.color = v !== sliderMeta[state.selectedSlider].def ? 'var(--accent)' : 'var(--ink-mute)';
}

function updatePillIndicators() {
  document.querySelectorAll('.pill-slider').forEach(p => {
    const sid = p.dataset.slider;
    if (!sid) return;
    const v = state.adjustments[sid];
    const def = sliderMeta[sid].def;
    const valEl = p.querySelector('.pill-val');
    if (v !== def) {
      p.classList.add('modified');
      valEl.textContent = v > 0 ? `+${v}` : `${v}`;
    } else {
      p.classList.remove('modified');
      valEl.textContent = '';
    }
  });
}

function resetAll() {
  Object.keys(state.adjustments).forEach(k => {
    state.adjustments[k] = sliderMeta[k].def;
  });
  state.activeFilter = 'none';
  state.filterIntensity = 1.0;

  // 重設強度滑桿 UI
  intensitySlider.value = 100;
  intensitySlider.style.setProperty('--fill', '100%');
  intensityValue.textContent = '100%';
  document.getElementById('filterIntensity').classList.remove('visible');

  document.querySelectorAll('.filter-card').forEach(c => {
    c.classList.toggle('active', c.dataset.filter === 'none');
  });
  filterTag.classList.remove('visible');
  bigSlider.value = state.adjustments[state.selectedSlider];
  updateBigSliderValue();
  updatePillIndicators();

  // 清掉文字
  if (state.textObjects && state.textObjects.length > 0) {
    state.textObjects = [];
    state.selectedTextId = null;
    if (typeof renderTextOverlay === 'function') renderTextOverlay();
  }

  applyAll();
  showToast('已重置');
}

const textColors = ['#ffffff', '#000000', '#ff4d4d', '#ffd54a', '#4a9eff', '#7ad06d', '#ff9d6c', '#c084fc'];

// 渲染字體選擇 (依分類過濾)
function renderFonts() {
  const row = document.getElementById('fontRow');
  row.innerHTML = '';

  // 過濾
  const cat = state.fontCategory || 'all';
  const list = cat === 'all' ? fontTemplates : fontTemplates.filter(f => f.cat === cat);

  list.forEach((f) => {
    const card = document.createElement('div');
    card.className = 'font-card' + (f.id === state.selectedFontId ? ' active' : '');
    card.dataset.fontId = f.id;

    const preview = document.createElement('div');
    preview.className = 'font-preview';
    preview.textContent = f.preview;
    preview.style.fontFamily = f.style;
    preview.style.fontWeight = f.weight;
    if (f.fontStyle) preview.style.fontStyle = f.fontStyle;
    if (f.textTransform) preview.style.textTransform = f.textTransform;

    // 套用特效 class (Y2K 鉻金屬、3D 氣球字等)
    if (f.fxClass) {
      preview.classList.add(f.fxClass);
      preview.style.fontSize = '18px';
      // FX 角標
      const fxBadge = document.createElement('div');
      fxBadge.className = 'font-card-fx-label';
      fxBadge.textContent = 'FX';
      card.appendChild(fxBadge);
    }

    const name = document.createElement('div');
    name.className = 'font-name';
    name.textContent = f.name;

    card.appendChild(preview);
    card.appendChild(name);

    card.addEventListener('click', () => {
      document.querySelectorAll('.font-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      state.selectedFontId = f.id;
    });

    row.appendChild(card);
  });
}

    row.appendChild(s);
  });
}

document.getElementById('addTextBtn').addEventListener('click', () => {
  if (!state.image) {

  }
  const input = document.getElementById('textInput');
  const text = input.value.trim();

  input.value = '';
});

function addTextToCanvas(text, fontId, color) {
  const font = fontTemplates.find(f => f.id === fontId);
  if (!font) return;

  const id = 'txt_' + Date.now();
  // 預設大小:根據 canvas 短邊的 8%
  const baseSize = Math.round(Math.min(canvas.width, canvas.height) * 0.08);

  const obj = {
    id,
    text,
    font,
    color,
    // 相對於 canvas 的座標(0~1),這樣縮放也不會偏
    xPct: 0.5,
    yPct: 0.5,
    fontSize: baseSize,
    rotation: 0
  };
  state.textObjects.push(obj);
  state.selectedTextId = id;
  renderTextOverlay();
  showToast('已加入文字,可拖曳移動');
}

// 把文字物件畫到覆蓋層(DOM 形式,讓使用者拖)
function renderTextOverlay() {
  const overlay = document.getElementById('textOverlay');
  overlay.innerHTML = '';

  if (!state.image) return;

  // 取得 canvas 在頁面上的實際尺寸
  const canvasRect = canvas.getBoundingClientRect();
  const wrapRect = photoWrap.getBoundingClientRect();
  const offsetX = canvasRect.left - wrapRect.left;
  const offsetY = canvasRect.top - wrapRect.top;

  // 計算實際渲染倍率
  const scale = canvasRect.width / canvas.width;

  state.textObjects.forEach(obj => {
    const el = document.createElement('div');
    el.className = 'text-obj' + (obj.id === state.selectedTextId ? ' selected' : '');
    el.dataset.id = obj.id;
    el.style.left = (offsetX + obj.xPct * canvasRect.width) + 'px';
    el.style.top = (offsetY + obj.yPct * canvasRect.height) + 'px';
    el.style.fontFamily = obj.font.style;
    el.style.fontWeight = obj.font.weight;
    el.style.fontSize = (obj.fontSize * scale) + 'px';
    el.style.transform = `translate(-50%,-50%) rotate(${obj.rotation}deg)`;
    if (obj.font.fontStyle) el.style.fontStyle = obj.font.fontStyle;
    if (obj.font.textTransform) el.style.textTransform = obj.font.textTransform;
    if (obj.font.letterSpacing) el.style.letterSpacing = obj.font.letterSpacing;

    // 套用特效 class 或一般顏色
    if (obj.font.fxClass) {
      el.classList.add(obj.font.fxClass);
    } else {
      el.style.color = obj.color;
      el.style.textShadow = '0 1px 3px rgba(0,0,0,0.3)';
    }

    const content = document.createElement('span');
    content.className = 'text-content';
    content.textContent = obj.text;
    el.appendChild(content);

    // 刪除按鈕
    const del = document.createElement('div');
    del.className = 'text-delete';
    del.textContent = '×';
    del.addEventListener('pointerdown', e => {
      e.stopPropagation();
      state.textObjects = state.textObjects.filter(o => o.id !== obj.id);
      if (state.selectedTextId === obj.id) state.selectedTextId = null;
      renderTextOverlay();
    });
    el.appendChild(del);

    // 拖曳邏輯
    let dragStartX = 0, dragStartY = 0;
    let objStartX = 0, objStartY = 0;
    let dragging = false;
    // 雙指縮放
    let initialPinchDistance = 0;
    let initialFontSize = 0;
    let activePointers = new Map();

    el.addEventListener('pointerdown', e => {
      e.stopPropagation();
      state.selectedTextId = obj.id;
      // 更新所有元素的 selected
      document.querySelectorAll('.text-obj').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');

      activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      el.setPointerCapture(e.pointerId);

      if (activePointers.size === 1) {
        dragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        objStartX = obj.xPct;
        objStartY = obj.yPct;
      } else if (activePointers.size === 2) {
        dragging = false;
        const points = [...activePointers.values()];
        initialPinchDistance = Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
        initialFontSize = obj.fontSize;
      }
    });

    el.addEventListener('pointermove', e => {
      if (!activePointers.has(e.pointerId)) return;
      activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

      if (activePointers.size === 1 && dragging) {
        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;
        const rect = canvas.getBoundingClientRect();
        obj.xPct = Math.max(0, Math.min(1, objStartX + dx / rect.width));
        obj.yPct = Math.max(0, Math.min(1, objStartY + dy / rect.height));
        el.style.left = (offsetX + obj.xPct * rect.width) + 'px';
        el.style.top = (offsetY + obj.yPct * rect.height) + 'px';
      } else if (activePointers.size === 2) {
        const points = [...activePointers.values()];
        const dist = Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
        const scaleFactor = dist / initialPinchDistance;
        obj.fontSize = Math.max(12, Math.min(400, initialFontSize * scaleFactor));
        const sc = canvas.getBoundingClientRect().width / canvas.width;
        el.style.fontSize = (obj.fontSize * sc) + 'px';
      }
    });

    const endPointer = e => {
      activePointers.delete(e.pointerId);
      if (activePointers.size < 2) dragging = activePointers.size === 1;
    };
    el.addEventListener('pointerup', endPointer);
    el.addEventListener('pointercancel', endPointer);

    overlay.appendChild(el);
  });
}

// 把文字烘焙到 canvas (輸出時用)
function bakeTextToCanvas(targetCanvas, targetCtx) {
  state.textObjects.forEach(obj => {
    targetCtx.save();
    const x = obj.xPct * targetCanvas.width;
    const y = obj.yPct * targetCanvas.height;
    targetCtx.translate(x, y);
    targetCtx.rotate(obj.rotation * Math.PI / 180);

    let fontStr = '';
    if (obj.font.fontStyle === 'italic') fontStr += 'italic ';
    fontStr += `${obj.font.weight} ${obj.fontSize}px ${obj.font.style}`;
    targetCtx.font = fontStr;
    targetCtx.textAlign = 'center';
    targetCtx.textBaseline = 'middle';

    let displayText = obj.text;
    if (obj.font.textTransform === 'uppercase') displayText = displayText.toUpperCase();

    if (targetCtx.letterSpacing !== undefined && obj.font.letterSpacing) {
      targetCtx.letterSpacing = obj.font.letterSpacing;
    }

    // 套用特效繪製
    if (obj.font.fxClass) {
      drawFxText(targetCtx, displayText, obj.font.fxClass, obj.fontSize);
    } else {
      // 一般文字 + 陰影
      targetCtx.shadowColor = 'rgba(0,0,0,0.3)';
      targetCtx.shadowBlur = 4;
      targetCtx.shadowOffsetY = obj.fontSize * 0.03;
      targetCtx.fillStyle = obj.color;
      targetCtx.fillText(displayText, 0, 0);
    }

    targetCtx.restore();
  });
}

// 在 Canvas 上繪製特效文字 (對應 CSS 的 fx-xxx class)
function drawFxText(ctx, text, fxClass, fontSize) {
  const metrics = ctx.measureText(text);
  const textW = metrics.width;
  const textH = fontSize;

  switch (fxClass) {
    case 'fx-chrome': {
      const grad = ctx.createLinearGradient(0, -textH/2, 0, textH/2);
      grad.addColorStop(0, '#e8f4ff');
      grad.addColorStop(0.25, '#7fb8e8');
      grad.addColorStop(0.5, '#2a5a8a');
      grad.addColorStop(0.51, '#1a3a5a');
      grad.addColorStop(0.75, '#5a8ec0');
      grad.addColorStop(1, '#c8e0f0');
      ctx.shadowColor = 'rgba(120,200,255,0.5)';
      ctx.shadowBlur = 6;
      ctx.fillStyle = grad;
      ctx.fillText(text, 0, 0);
      break;
    }
    case 'fx-silver': {
      const grad = ctx.createLinearGradient(0, -textH/2, 0, textH/2);
      grad.addColorStop(0, '#ffffff');
      grad.addColorStop(0.35, '#c0c0c0');
      grad.addColorStop(0.5, '#6b6b6b');
      grad.addColorStop(0.51, '#2a2a2a');
      grad.addColorStop(0.65, '#6b6b6b');
      grad.addColorStop(1, '#d4d4d4');
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 3;
      ctx.shadowOffsetY = 2;
      ctx.fillStyle = grad;
      ctx.fillText(text, 0, 0);
      break;
    }
    case 'fx-gold': {
      const grad = ctx.createLinearGradient(0, -textH/2, 0, textH/2);
      grad.addColorStop(0, '#fff5d4');
      grad.addColorStop(0.3, '#f4d168');
      grad.addColorStop(0.55, '#b8841f');
      grad.addColorStop(0.7, '#6a4a10');
      grad.addColorStop(0.85, '#b8841f');
      grad.addColorStop(1, '#f4d168');
      ctx.shadowColor = 'rgba(0,0,0,0.4)';
      ctx.shadowBlur = 4;
      ctx.shadowOffsetY = 2;
      ctx.fillStyle = grad;
      ctx.fillText(text, 0, 0);
      break;
    }
    case 'fx-bubble-pink': {
      // 多層描邊堆疊出 3D 氣球效果
      const offsets = [
        { x: 6, y: 6, c: '#b51a4a' },
        { x: 5, y: 5, c: '#d62059' },
        { x: 4, y: 4, c: '#d62059' },
        { x: 3, y: 3, c: '#d62059' },
        { x: 2, y: 2, c: '#d62059' }
      ];
      offsets.forEach(o => {
        ctx.fillStyle = o.c;
        ctx.fillText(text, o.x, o.y);
      });
      // 主體
      ctx.lineWidth = fontSize * 0.04;
      ctx.strokeStyle = '#ff4d7a';
      ctx.strokeText(text, 0, 0);
      ctx.fillStyle = '#ffb8c8';
      ctx.fillText(text, 0, 0);
      break;
    }
    case 'fx-3d-red': {
      // 紅黑 3D
      for (let i = 6; i >= 2; i--) {
        ctx.fillStyle = '#000';
        ctx.fillText(text, i, i);
      }
      ctx.fillStyle = '#ff3838';
      ctx.fillText(text, 0, 0);
      break;
    }
    case 'fx-outline': {
      ctx.lineWidth = Math.max(2, fontSize * 0.05);
      ctx.strokeStyle = '#fff';
      ctx.strokeText(text, 0, 0);
      break;
    }
    case 'fx-outline-double': {
      // 紅外圈
      ctx.lineWidth = fontSize * 0.12;
      ctx.strokeStyle = '#ff4d4d';
      ctx.strokeText(text, 0, 0);
      // 黑中圈
      ctx.lineWidth = fontSize * 0.06;
      ctx.strokeStyle = '#000';
      ctx.strokeText(text, 0, 0);
      // 白字
      ctx.fillStyle = '#fff';
      ctx.fillText(text, 0, 0);
      break;
    }
    case 'fx-neon': {
      ctx.shadowColor = '#ff00de';
      ctx.shadowBlur = fontSize * 0.6;
      ctx.fillStyle = '#fff';
      // 多次繪製增強發光
      for (let i = 0; i < 4; i++) ctx.fillText(text, 0, 0);
      ctx.shadowBlur = 0;
      ctx.fillText(text, 0, 0);
      break;
    }
    case 'fx-neon-green': {
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = fontSize * 0.6;
      ctx.fillStyle = '#d0ffd0';
      for (let i = 0; i < 4; i++) ctx.fillText(text, 0, 0);
      ctx.shadowBlur = 0;
      ctx.fillText(text, 0, 0);
      break;
    }
    case 'fx-retro-stripe': {
      const grad = ctx.createLinearGradient(0, -textH/2, 0, textH/2);
      grad.addColorStop(0, '#ff006e');
      grad.addColorStop(0.2, '#ff006e');
      grad.addColorStop(0.2, '#ff9500');
      grad.addColorStop(0.4, '#ff9500');
      grad.addColorStop(0.4, '#ffd60a');
      grad.addColorStop(0.6, '#ffd60a');
      grad.addColorStop(0.6, '#06d6a0');
      grad.addColorStop(0.8, '#06d6a0');
      grad.addColorStop(0.8, '#118ab2');
      grad.addColorStop(1, '#118ab2');
      ctx.shadowColor = 'rgba(0,0,0,0.6)';
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 2;
      ctx.fillStyle = grad;
      ctx.fillText(text, 0, 0);
      break;
    }
    case 'fx-fire': {
      const grad = ctx.createLinearGradient(0, -textH/2, 0, textH/2);
      grad.addColorStop(0, '#fff700');
      grad.addColorStop(0.4, '#ff9500');
      grad.addColorStop(0.8, '#ff3838');
      grad.addColorStop(1, '#8b0000');
      ctx.shadowColor = 'rgba(255,100,0,0.6)';
      ctx.shadowBlur = 8;
      ctx.fillStyle = grad;
      ctx.fillText(text, 0, 0);
      break;
    }
    case 'fx-holo': {
      const grad = ctx.createLinearGradient(-textW/2, -textH/2, textW/2, textH/2);
      grad.addColorStop(0, '#ff00de');
      grad.addColorStop(0.25, '#00d4ff');
      grad.addColorStop(0.5, '#00ff88');
      grad.addColorStop(0.75, '#ffd60a');
      grad.addColorStop(1, '#ff00de');
      ctx.shadowColor = 'rgba(255,0,222,0.5)';
      ctx.shadowBlur = 4;
      ctx.fillStyle = grad;
      ctx.fillText(text, 0, 0);
      break;
    }
    default:
      ctx.fillStyle = '#fff';
      ctx.fillText(text, 0, 0);
  }
}

// ============================================================
// CROP MODE
// ============================================================
state.cropMode = false;
state.cropRatio = 'free';
state.cropBox = null;  // {x, y, w, h} 相對於 canvas 顯示尺寸的像素

function enterCropMode() {
  if (!state.image) return;
  state.cropMode = true;
  document.getElementById('cropOverlay').classList.add('active');
  initCropBox();
}

function exitCropMode() {
  state.cropMode = false;
  document.getElementById('cropOverlay').classList.remove('active');
}

function initCropBox() {
  const canvasRect = canvas.getBoundingClientRect();
  const wrapRect = photoWrap.getBoundingClientRect();
  const offsetX = canvasRect.left - wrapRect.left;
  const offsetY = canvasRect.top - wrapRect.top;
  const dispW = canvasRect.width;
  const dispH = canvasRect.height;

  let boxW, boxH;
  if (state.cropRatio === 'free') {
    boxW = dispW * 0.85;
    boxH = dispH * 0.85;
  } else {
    const [rw, rh] = state.cropRatio.split(':').map(Number);
    const targetRatio = rw / rh;
    const imgRatio = dispW / dispH;
    if (imgRatio > targetRatio) {
      boxH = dispH * 0.9;
      boxW = boxH * targetRatio;
    } else {
      boxW = dispW * 0.9;
      boxH = boxW / targetRatio;
    }
  }

  state.cropBox = {
    x: offsetX + (dispW - boxW) / 2,
    y: offsetY + (dispH - boxH) / 2,
    w: boxW,
    h: boxH,
    canvasOffsetX: offsetX,
    canvasOffsetY: offsetY,
    canvasW: dispW,
    canvasH: dispH
  };
  renderCropBox();
}

function renderCropBox() {
  if (!state.cropBox) return;
  const f = document.getElementById('cropFrame');
  const cb = state.cropBox;
  f.style.left = cb.x + 'px';
  f.style.top = cb.y + 'px';
  f.style.width = cb.w + 'px';
  f.style.height = cb.h + 'px';

  // 更新遮罩
  const wrapRect = photoWrap.getBoundingClientRect();
  const W = wrapRect.width, H = wrapRect.height;
  document.getElementById('cropMaskTop').style.cssText =
    `left:0; top:0; width:100%; height:${cb.y}px;`;
  document.getElementById('cropMaskBottom').style.cssText =
    `left:0; top:${cb.y + cb.h}px; width:100%; height:${H - cb.y - cb.h}px;`;
  document.getElementById('cropMaskLeft').style.cssText =
    `left:0; top:${cb.y}px; width:${cb.x}px; height:${cb.h}px;`;
  document.getElementById('cropMaskRight').style.cssText =
    `left:${cb.x + cb.w}px; top:${cb.y}px; width:${W - cb.x - cb.w}px; height:${cb.h}px;`;
}

// 拖曳裁切框
const cropFrame = document.getElementById('cropFrame');
let cropDragMode = null;  // 'move' | 'tl' | 'tr' | 'bl' | 'br'
let cropDragStart = { x: 0, y: 0, box: null };

cropFrame.addEventListener('pointerdown', e => {
  const handle = e.target.closest('.crop-handle');
  cropDragMode = handle ? handle.dataset.handle : 'move';
  cropDragStart = {
    x: e.clientX,
    y: e.clientY,
    box: { ...state.cropBox }
  };
  cropFrame.setPointerCapture(e.pointerId);
  e.preventDefault();
});

cropFrame.addEventListener('pointermove', e => {
  if (!cropDragMode || !state.cropBox) return;
  const dx = e.clientX - cropDragStart.x;
  const dy = e.clientY - cropDragStart.y;
  const cb = state.cropBox;
  const startBox = cropDragStart.box;
  const minSize = 50;

  // 邊界限制
  const minX = startBox.canvasOffsetX;
  const maxX = startBox.canvasOffsetX + startBox.canvasW;
  const minY = startBox.canvasOffsetY;
  const maxY = startBox.canvasOffsetY + startBox.canvasH;

  // 計算比例(如果不是 free)
  let ratio = null;
  if (state.cropRatio !== 'free') {
    const [rw, rh] = state.cropRatio.split(':').map(Number);
    ratio = rw / rh;
  }

  if (cropDragMode === 'move') {
    cb.x = Math.max(minX, Math.min(maxX - cb.w, startBox.x + dx));
    cb.y = Math.max(minY, Math.min(maxY - cb.h, startBox.y + dy));
  } else {
    // 各個角點調整
    let newX = startBox.x, newY = startBox.y, newW = startBox.w, newH = startBox.h;

    if (cropDragMode.includes('l')) {
      newX = startBox.x + dx;
      newW = startBox.w - dx;
    }
    if (cropDragMode.includes('r')) {
      newW = startBox.w + dx;
    }
    if (cropDragMode.includes('t')) {
      newY = startBox.y + dy;
      newH = startBox.h - dy;
    }
    if (cropDragMode.includes('b')) {
      newH = startBox.h + dy;
    }

    // 固定比例
    if (ratio) {
      if (Math.abs(dx) > Math.abs(dy)) {
        newH = newW / ratio;
        if (cropDragMode.includes('t')) newY = startBox.y + startBox.h - newH;
      } else {
        newW = newH * ratio;
        if (cropDragMode.includes('l')) newX = startBox.x + startBox.w - newW;
      }
    }

    // 最小尺寸
    if (newW < minSize || newH < minSize) return;
    // 邊界
    if (newX < minX) { newW -= (minX - newX); newX = minX; if (ratio) newH = newW / ratio; }
    if (newY < minY) { newH -= (minY - newY); newY = minY; if (ratio) newW = newH * ratio; }
    if (newX + newW > maxX) { newW = maxX - newX; if (ratio) newH = newW / ratio; }
    if (newY + newH > maxY) { newH = maxY - newY; if (ratio) newW = newH * ratio; }

    cb.x = newX; cb.y = newY; cb.w = newW; cb.h = newH;
  }
  renderCropBox();
});

cropFrame.addEventListener('pointerup', () => { cropDragMode = null; });
cropFrame.addEventListener('pointercancel', () => { cropDragMode = null; });

// 套用裁切
document.getElementById('cropApplyBtn').addEventListener('click', () => {
  if (!state.cropBox || !state.image) return;
  const cb = state.cropBox;
  // 從顯示座標換算成原圖座標
  const scale = canvas.width / cb.canvasW;
  const srcX = (cb.x - cb.canvasOffsetX) * scale;
  const srcY = (cb.y - cb.canvasOffsetY) * scale;
  const srcW = cb.w * scale;
  const srcH = cb.h * scale;

  // 從目前 canvas (含所有調整濾鏡的成果)裁切
  const cropped = document.createElement('canvas');
  cropped.width = Math.round(srcW);
  cropped.height = Math.round(srcH);
  const cctx = cropped.getContext('2d');
  cctx.drawImage(canvas, srcX, srcY, srcW, srcH, 0, 0, cropped.width, cropped.height);

  // 烘焙文字到裁切後的圖
  if (state.textObjects.length > 0) {
    // 文字座標需要按照新尺寸映射
    state.textObjects.forEach(obj => {
      // 原本 xPct 是相對於原 canvas, 現在要轉成相對於裁切區
      const origX = obj.xPct * canvas.width;
      const origY = obj.yPct * canvas.height;
      const newX = origX - srcX;
      const newY = origY - srcY;
      obj.xPct = newX / srcW;
      obj.yPct = newY / srcH;
    });
  }

  // 取代當前 canvas 內容
  canvas.width = cropped.width;
  canvas.height = cropped.height;
  ctx.drawImage(cropped, 0, 0);

  // 重要:更新 originalImageData 為裁切後的版本,讓接下來的調整以此為基準
  state.originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  topMeta.textContent = `${canvas.width}×${canvas.height}`;

  // 重設縮圖
  const thumbCanvas = document.createElement('canvas');
  const tw = 64, th = 64;
  thumbCanvas.width = tw; thumbCanvas.height = th;
  const tctx = thumbCanvas.getContext('2d');
  const ratio = Math.max(tw / canvas.width, th / canvas.height);
  const sw = tw / ratio, sh = th / ratio;
  const sx = (canvas.width - sw) / 2, sy = (canvas.height - sh) / 2;
  tctx.drawImage(canvas, sx, sy, sw, sh, 0, 0, tw, th);
  state.thumbImageData = tctx.getImageData(0, 0, tw, th);

  exitCropMode();
  // 重新生成濾鏡縮圖
  renderFilterThumbs('film');
  renderFilterThumbs('trend');
  // 重新渲染文字疊加
  refreshTextOverlay();

  showToast('已套用裁切');
});

// 取消裁切
document.getElementById('cropCancelBtn').addEventListener('click', () => {
  exitCropMode();
  // 切回濾鏡 tab
  document.querySelector('.tab-btn[data-tab="filters"]').click();
});

async function openExportSheet() {
  // 建立一個臨時 canvas:包含目前濾鏡結果 + 烘焙文字
  const finalCanvas = document.createElement('canvas');
  finalCanvas.width = canvas.width;
  finalCanvas.height = canvas.height;
  const fctx = finalCanvas.getContext('2d');
  fctx.drawImage(canvas, 0, 0);
  // 烘焙文字
  if (state.textObjects && state.textObjects.length > 0) {
    bakeTextToCanvas(finalCanvas, fctx);
  }

  // 把臨時 canvas 轉成 blob
  const blob = await new Promise(resolve => {
    finalCanvas.toBlob(resolve, 'image/jpeg', 0.95);
  });

  if (!blob) {
    showToast('輸出失敗');
    return;
  }

  const filename = `darkroom_${Date.now()}.jpg`;
  const file = new File([blob], filename, { type: 'image/jpeg' });
  const url = URL.createObjectURL(blob);

  // 顯示預覽圖(讓使用者可以長按存到相簿)
  exportImage.src = url;
  exportPreview.style.display = 'block';

  // 清空按鈕區
  exportActions.innerHTML = '';

  // 偵測 Web Share API 是否支援檔案分享
  const canShareFiles = navigator.canShare && navigator.canShare({ files: [file] });

  if (isMobile) {
    exportTipLongPress.style.display = 'flex';
  } else {
    exportTipLongPress.style.display = 'none';
  }

  // === 方案 A: Web Share (iOS / Android 主推) ===
  if (canShareFiles) {
    const btn = createExportBtn({
      primary: true,
      icon: 'share',
      title: isIOS ? '分享到相簿 / 其他 App' : '分享或儲存',
      desc: isIOS ? '會打開系統分享面板,選「儲存影像」即可' : '可選擇儲存到相片或傳送給朋友',
      onClick: async () => {
        try {
          await navigator.share({
            files: [file],
            title: 'Darkroom 修圖',
          });
          // 不顯示成功 toast,因為使用者可能是取消
        } catch (err) {
          if (err.name !== 'AbortError') {
            showToast('分享失敗,試試其他方式');
          }
        }
      }
    });
    exportActions.appendChild(btn);
  }

  // === 方案 B: iOS 特別流程,提示長按 ===
  if (isIOS && !canShareFiles) {
    // 在 iOS 上沒有 Web Share Files 時,長按預覽圖是唯一靠譜的入相簿方式
    exportTipLongPress.style.display = 'flex';
  }

  // === 方案 C: 標準下載 (所有平台都有) ===
  const downloadBtn = createExportBtn({
    primary: !canShareFiles,
    icon: 'download',
    title: '下載到裝置',
    desc: isIOS ? '存到「檔案」App,可再從那邊存到相簿' : '存到下載資料夾',
    onClick: () => {
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      showToast('已開始下載');
    }
  });
  exportActions.appendChild(downloadBtn);

  // === 方案 D: 在新分頁打開,讓使用者可以長按 ===
  if (isMobile) {
    const openBtn = createExportBtn({
      icon: 'open',
      title: '在新分頁打開',
      desc: '打開後長按圖片即可儲存',
      onClick: () => {
        const w = window.open();
        if (w) {
          w.document.write(`
            <html><head><title>Darkroom 輸出</title>
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <style>body{margin:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:8px;}
            img{max-width:100%;height:auto;display:block;}
            p{color:#fff;font-family:sans-serif;text-align:center;font-size:14px;margin:12px;}</style>
            </head><body>
            <div><img src="${url}"/><p>長按圖片 → 儲存影像</p></div>
            </body></html>
          `);
        }
      }
    });
    exportActions.appendChild(openBtn);
  }

  exportModal.classList.add('show');
}

function createExportBtn({ primary, icon, title, desc, onClick }) {
  const btn = document.createElement('button');
  btn.className = 'export-btn' + (primary ? ' primary' : '');

  const icons = {
    share: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v13"/><path d="M16 6l-4-4-4 4"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/></svg>',
    download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
    open: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>',
  };

  btn.innerHTML = `
    ${icons[icon] || ''}
    <div class="export-btn-content">
      <div class="export-btn-title">${title}</div>
      <div class="export-btn-desc">${desc}</div>
    </div>
  `;
  btn.addEventListener('click', onClick);
  return btn;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1600);
}

// ============================================================
// CORE: APPLY FILTER + ADJUSTMENTS
// ============================================================
function applyAll() {
  if (!state.originalImageData || state.showOriginal) return;
  procDot.classList.add('show');
  requestAnimationFrame(() => {
    const out = applyFilterToImageData(
      state.originalImageData,
      state.activeFilter,
      state.adjustments,
      state.filterIntensity
    );
    ctx.putImageData(out, 0, 0);

    // 暈影
    if (state.adjustments.vignette > 0) {
      const w = canvas.width, h = canvas.height;
      const strength = state.adjustments.vignette / 100;
      const grd = ctx.createRadialGradient(w/2, h/2, Math.min(w,h)*0.3, w/2, h/2, Math.max(w,h)*0.75);
      grd.addColorStop(0, 'rgba(0,0,0,0)');
      grd.addColorStop(1, `rgba(0,0,0,${strength * 0.85})`);
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, w, h);
    }

    // 顆粒
    if (state.adjustments.grain > 0) {
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const d = imgData.data;
      const intensity = state.adjustments.grain * 0.6;
      for (let i = 0; i < d.length; i += 4) {
        const noise = (Math.random() - 0.5) * intensity;
        d[i] = clamp(d[i] + noise);
        d[i+1] = clamp(d[i+1] + noise);
        d[i+2] = clamp(d[i+2] + noise);
      }
      ctx.putImageData(imgData, 0, 0);
    }

    // CSS濾鏡 for blur/sharpen
    const cssF = [];
    if (state.adjustments.blur > 0) cssF.push(`blur(${state.adjustments.blur/25}px)`);
    if (state.adjustments.sharpen > 0) cssF.push(`contrast(${1 + state.adjustments.sharpen/300}) saturate(${1 + state.adjustments.sharpen/400})`);
    canvas.style.filter = cssF.join(' ');

    procDot.classList.remove('show');

    // 重繪文字疊加(canvas 尺寸可能因 layout 微調)
    if (state.textObjects && state.textObjects.length > 0) {
      requestAnimationFrame(() => renderTextOverlay());
    }
  });
}

function applyFilterToImageData(src, filterId, adj, intensity) {
  // intensity: 0~1，控制濾鏡的色彩變化套用多少。1 = 完整套用，0 = 完全不套
  // 注意:亮度/對比/色溫等「使用者滑桿」的調整不受 intensity 影響，
  // 只有「濾鏡 preset 帶來的色彩偏移」才受 intensity 影響。
  if (intensity === undefined) intensity = 1.0;

  const out = new ImageData(
    new Uint8ClampedArray(src.data),
    src.width,
    src.height
  );
  const sd = src.data, od = out.data;
  const preset = filterPresets[filterId] || filterPresets['none'];
  const extras = preset.extras || {};
  const hasFilter = filterId !== 'none';
  const k = hasFilter ? intensity : 0;  // 濾鏡實際生效強度

  // 使用者滑桿:完整套用
  const userBrightness = adj.brightness || 0;
  const userContrast = adj.contrast || 0;
  const userExposure = adj.exposure || 0;
  const userSaturation = adj.saturation || 0;
  const userTemp = adj.temperature || 0;
  const userTint = adj.tint || 0;
  const userShadows = (adj.shadows || 0) / 100;
  const userHighlights = (adj.highlights || 0) / 100;

  // 濾鏡 preset 的附加值:乘上 k
  const filterBrightness = (extras.exposure || 0) * 0.6 * k;
  const filterContrast = (extras.contrast || 0) * k;
  const filterSaturation = (extras.saturation || 0) * k;
  const filterWarmth = (extras.warmth || 0) * k;
  const filterFade = ((extras.fade || 0) / 100) * k;

  // 合併
  const brightness = userBrightness + filterBrightness;
  const contrastVal = userContrast + filterContrast;
  const contrastF = (contrastVal + 100) / 100;
  const exposureF = Math.pow(2, userExposure / 100);
  const saturationF = 1 + (userSaturation + filterSaturation) / 100;
  const warmth = userTemp + filterWarmth;
  const tintVal = userTint;
  const fade = filterFade;

  const isBW = preset.curve === 'bw';
  const len = sd.length;

  for (let i = 0; i < len; i += 4) {
    let r = sd[i], g = sd[i+1], b = sd[i+2];

    r *= exposureF; g *= exposureF; b *= exposureF;
    r += brightness; g += brightness; b += brightness;
    r = (r - 128) * contrastF + 128;
    g = (g - 128) * contrastF + 128;
    b = (b - 128) * contrastF + 128;
    r += warmth * 0.4;
    b -= warmth * 0.4;
    g += tintVal * 0.3;
    r -= tintVal * 0.15;
    b -= tintVal * 0.15;

    const lum = (r * 0.299 + g * 0.587 + b * 0.114) / 255;
    const shadowMask = Math.pow(1 - lum, 2);
    const highlightMask = Math.pow(lum, 2);
    r += userShadows * 50 * shadowMask + userHighlights * 50 * highlightMask;
    g += userShadows * 50 * shadowMask + userHighlights * 50 * highlightMask;
    b += userShadows * 50 * shadowMask + userHighlights * 50 * highlightMask;

    const gray = r * 0.299 + g * 0.587 + b * 0.114;
    r = gray + (r - gray) * saturationF;
    g = gray + (g - gray) * saturationF;
    b = gray + (b - gray) * saturationF;

    // 濾鏡的三段色偏:乘 k
    if (hasFilter && preset.r) {
      const sw = Math.max(0, 1 - lum * 2);
      const mw = 1 - Math.abs(lum - 0.5) * 2;
      const hw = Math.max(0, lum * 2 - 1);
      r += (preset.r[0]*sw + preset.r[1]*mw + preset.r[2]*hw) * k;
      g += (preset.g[0]*sw + preset.g[1]*mw + preset.g[2]*hw) * k;
      b += (preset.b[0]*sw + preset.b[1]*mw + preset.b[2]*hw) * k;
    }

    // 黑白:用 k 在彩色與黑白之間插值
    if (isBW && k > 0) {
      const v = r * 0.299 + g * 0.587 + b * 0.114;
      r = r * (1 - k) + v * k;
      g = g * (1 - k) + v * k;
      b = b * (1 - k) + v * k;
    }

    if (fade > 0) {
      r = r * (1 - fade) + 128 * fade;
      g = g * (1 - fade) + 128 * fade;
      b = b * (1 - fade) + 128 * fade;
    }

    // 曲線:用 k 在原值與曲線結果之間插值
    if (hasFilter && k > 0) {
      let cr = r, cg = g, cb = b;
      if (preset.curve === 'cinema') {
        if (r < 60) cr = r * 0.85 + 8;
        if (g < 60) cg = g * 0.85 + 8;
        if (b < 60) cb = b * 0.85 + 8;
      } else if (preset.curve === 'punchy') {
        cr = (r - 128) * 1.12 + 128;
        cg = (g - 128) * 1.12 + 128;
        cb = (b - 128) * 1.12 + 128;
      } else if (preset.curve === 'soft') {
        cr = r * 0.92 + 18; cg = g * 0.92 + 18; cb = b * 0.92 + 18;
      } else if (preset.curve === 'film') {
        cr = filmCurve(r); cg = filmCurve(g); cb = filmCurve(b);
      } else if (preset.curve === 'fade') {
        cr = r * 0.85 + 28; cg = g * 0.85 + 28; cb = b * 0.85 + 28;
      }
      r = r * (1 - k) + cr * k;
      g = g * (1 - k) + cg * k;
      b = b * (1 - k) + cb * k;
    }

    od[i]   = clamp(r);
    od[i+1] = clamp(g);
    od[i+2] = clamp(b);
    od[i+3] = sd[i+3];
  }
  return out;
}

function filmCurve(v) {
  const n = v / 255;
  const c = n < 0.5 ? 2*n*n : 1 - Math.pow(-2*n + 2, 2)/2;
  return c * 255;
}
function clamp(v) { return v < 0 ? 0 : v > 255 ? 255 : v; }

// 初始化:預設選 exposure
selectPill(document.querySelector('.pill-slider[data-slider="exposure"]'));
</script>
