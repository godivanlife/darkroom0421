<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Darkroom · 行動修圖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --bg-2: #0d0d0d;
    --panel: #1a1a1a;
    --panel-2: #232323;
    --line: #2a2a2a;
    --ink: #ffffff;
    --ink-dim: #a8a8a8;
    --ink-mute: #6a6a6a;
    --accent: #4a9eff;
    --accent-2: #ffd54a;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans TC', 'Inter', -apple-system, system-ui, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  .app {
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ============ TOP BAR ============ */
  .topbar {
    height: 52px;
    padding-top: var(--safe-top);
    height: calc(52px + var(--safe-top));
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-left: 16px;
    padding-right: 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
    z-index: 10;
  }

  .top-left, .top-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .icon-btn {
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    color: var(--ink);
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.15s;
  }
  .icon-btn:active { background: var(--panel); }
  .icon-btn svg { width: 22px; height: 22px; }

  .icon-btn.primary {
    color: var(--accent);
  }

  .top-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--ink);
  }
  .top-title .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-mute);
    display: block;
    text-align: center;
    margin-top: 1px;
    letter-spacing: 0.15em;
  }

  /* ============ PHOTO AREA ============ */
  .photo-stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: var(--bg);
    overflow: hidden;
    min-height: 0;
  }

  .photo-wrap {
    max-width: 100%;
    max-height: 100%;
    position: relative;
    display: none;
  }

  #photoCanvas {
    display: block;
    max-width: 100vw;
    max-height: 100%;
    object-fit: contain;
  }

  /* upload */
  .upload-zone {
    text-align: center;
    padding: 40px 30px;
  }
  .upload-icon-circle {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: 1.5px dashed var(--ink-mute);
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .upload-icon-circle svg {
    width: 36px;
    height: 36px;
    stroke: var(--ink-dim);
  }
  .upload-text {
    font-size: 17px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--ink);
  }
  .upload-hint {
    font-size: 12px;
    color: var(--ink-mute);
    letter-spacing: 0.05em;
  }
  .upload-btn {
    margin-top: 24px;
    padding: 12px 32px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  #fileInput { display: none; }

  /* compare button (long-press to show original) */
  .compare-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--ink);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 5;
  }
  .compare-btn.visible { display: flex; }
  .compare-btn svg { width: 16px; height: 16px; }
  .compare-btn:active, .compare-btn.holding {
    background: var(--accent);
  }

  .filter-tag-overlay {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 6px 12px;
    border-radius: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--accent-2);
    display: none;
  }
  .filter-tag-overlay.visible { display: block; }

  /* ============ BOTTOM PANEL ============ */
  .bottom-panel {
    background: var(--bg-2);
    border-top: 1px solid var(--line);
    flex-shrink: 0;
    padding-bottom: var(--safe-bottom);
    transition: transform 0.3s ease;
  }

  /* tab content */
  .tab-content {
    display: none;
    min-height: 180px;
    max-height: 50vh;
    overflow: hidden;
  }
  .tab-content.active {
    display: block;
  }

  /* === FILTERS TAB === */
  .filter-section-tabs {
    display: flex;
    gap: 20px;
    padding: 12px 16px 0;
    border-bottom: 1px solid var(--line);
  }
  .filter-section-tab {
    background: none;
    border: none;
    color: var(--ink-mute);
    font-size: 13px;
    font-weight: 500;
    padding: 8px 0;
    cursor: pointer;
    position: relative;
  }
  .filter-section-tab.active {
    color: var(--ink);
  }
  .filter-section-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent);
  }

  .filter-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 14px 16px 16px;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .filter-scroll::-webkit-scrollbar { display: none; }

  .filter-card {
    flex-shrink: 0;
    scroll-snap-align: start;
    width: 76px;
    cursor: pointer;
    position: relative;
  }

  .filter-thumb {
    width: 76px;
    height: 76px;
    border-radius: 10px;
    background: var(--panel);
    border: 2px solid transparent;
    overflow: hidden;
    position: relative;
    transition: border-color 0.2s;
  }

  .filter-card.active .filter-thumb {
    border-color: var(--accent);
  }

  .filter-thumb canvas, .filter-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .filter-thumb-placeholder {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-mute);
    letter-spacing: 0.1em;
  }

  .filter-name {
    text-align: center;
    font-size: 11px;
    margin-top: 6px;
    color: var(--ink-dim);
    line-height: 1.2;
    height: 26px;
    overflow: hidden;
  }
  .filter-card.active .filter-name {
    color: var(--ink);
    font-weight: 500;
  }

  /* === FILTER INTENSITY SLIDER === */
  .filter-intensity {
    padding: 6px 24px 14px;
    border-top: 1px solid var(--line);
    display: none;
    animation: slideDown 0.2s ease;
  }
  .filter-intensity.visible {
    display: block;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .intensity-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 10px 0 12px;
  }
  .intensity-label {
    font-size: 12px;
    color: var(--ink-dim);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .intensity-label .filter-name-inline {
    color: var(--accent-2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
  }
  .intensity-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
  }

  .intensity-slider-wrap {
    position: relative;
    height: 28px;
    display: flex;
    align-items: center;
  }

  input[type=range].intensity-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--fill, 100%), var(--line) var(--fill, 100%), var(--line) 100%);
    outline: none;
    margin: 0;
  }
  input[type=range].intensity-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    background: var(--ink);
    cursor: pointer;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  input[type=range].intensity-slider::-moz-range-thumb {
    width: 20px;
    height: 20px;
    background: var(--ink);
    cursor: pointer;
    border-radius: 50%;
    border: none;
  }

  /* === ADJUST TAB === */
  .adjust-tab-container {
    padding-bottom: 8px;
  }

  .adjust-category-bar {
    display: flex;
    gap: 0;
    padding: 12px 16px 0;
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
  }
  .adjust-category-bar::-webkit-scrollbar { display: none; }

  .adjust-cat {
    background: none;
    border: none;
    color: var(--ink-mute);
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    cursor: pointer;
    position: relative;
    white-space: nowrap;
  }
  .adjust-cat.active { color: var(--ink); }
  .adjust-cat.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 14px;
    right: 14px;
    height: 2px;
    background: var(--accent);
  }

  .adjust-sliders {
    display: none;
    padding: 8px 0 12px;
  }
  .adjust-sliders.active { display: block; }

  /* sub-tabs render as a horizontal scroll of "pill" sliders, classic Lightroom mobile style */
  .pill-row {
    display: flex;
    gap: 0;
    overflow-x: auto;
    padding: 8px 16px 4px;
    -webkit-overflow-scrolling: touch;
  }
  .pill-row::-webkit-scrollbar { display: none; }

  .pill-slider {
    flex-shrink: 0;
    width: 70px;
    text-align: center;
    cursor: pointer;
    padding: 6px 0;
    border-radius: 8px;
  }
  .pill-slider.selected {
    background: var(--panel);
  }
  .pill-slider .pill-icon {
    width: 36px;
    height: 36px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-dim);
  }
  .pill-slider.selected .pill-icon { color: var(--accent); }
  .pill-slider.modified .pill-icon { color: var(--accent-2); }
  .pill-slider .pill-icon svg { width: 22px; height: 22px; }
  .pill-slider .pill-label {
    font-size: 10.5px;
    color: var(--ink-dim);
    margin-top: 2px;
  }
  .pill-slider.selected .pill-label { color: var(--ink); }
  .pill-slider .pill-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-mute);
    margin-top: 1px;
    height: 11px;
  }
  .pill-slider.modified .pill-val { color: var(--accent-2); }

  /* large slider for the currently-selected adjustment */
  .big-slider-area {
    padding: 14px 24px 12px;
    border-top: 1px solid var(--line);
    margin-top: 4px;
  }

  .big-slider-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .big-slider-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
  }
  .big-slider-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    min-width: 40px;
    text-align: right;
  }

  .slider-wrap {
    position: relative;
    height: 28px;
    display: flex;
    align-items: center;
  }

  input[type=range].big-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: var(--line);
    outline: none;
    margin: 0;
    position: relative;
    z-index: 2;
  }
  input[type=range].big-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    background: var(--ink);
    cursor: pointer;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  input[type=range].big-slider::-moz-range-thumb {
    width: 22px;
    height: 22px;
    background: var(--ink);
    cursor: pointer;
    border-radius: 50%;
    border: none;
  }

  .slider-center-tick {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 2px;
    height: 10px;
    background: var(--ink-mute);
    transform: translate(-50%, -50%);
    z-index: 1;
    border-radius: 2px;
  }

  /* ============ BOTTOM TAB BAR ============ */
  .tabbar {
    height: 60px;
    background: var(--bg);
    border-top: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding-bottom: var(--safe-bottom);
    flex-shrink: 0;
  }

  .tab-btn {
    background: none;
    border: none;
    color: var(--ink-mute);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    padding: 6px 12px;
    flex: 1;
    min-width: 0;
  }
  .tab-btn svg { width: 22px; height: 22px; }
  .tab-btn span {
    font-size: 11px;
    font-weight: 500;
  }
  .tab-btn.active { color: var(--accent); }

  /* ============ TOAST ============ */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.95);
    color: #000;
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(-6px);
  }

  /* processing indicator */
  .processing-dot {
    position: absolute;
    bottom: 12px;
    right: 12px;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .processing-dot.show {
    opacity: 1;
    animation: pulse 0.8s ease infinite;
  }
  @keyframes pulse {
    50% { transform: scale(1.6); opacity: 0.4; }
  }

  /* ============ MODAL ============ */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 50;
    display: none;
    align-items: flex-end;
  }
  .modal-backdrop.show { display: flex; }
  .modal-sheet {
    width: 100%;
    background: var(--panel);
    border-radius: 16px 16px 0 0;
    padding: 20px 20px calc(20px + var(--safe-bottom));
    transform: translateY(100%);
    transition: transform 0.25s ease;
  }
  .modal-backdrop.show .modal-sheet {
    transform: translateY(0);
  }
  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--ink-mute);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .modal-title {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 16px;
    text-align: center;
  }
  .modal-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .modal-btn {
    padding: 14px;
    background: var(--panel-2);
    border: none;
    color: var(--ink);
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    padding-left: 20px;
  }
  .modal-btn.danger { color: #ff6b6b; }
  .modal-btn:active { background: var(--line); }
</style>
</head>
<body>

<div class="app">

  <!-- ============ TOP BAR ============ -->
  <header class="topbar">
    <div class="top-left">
      <button class="icon-btn" id="moreBtn" aria-label="更多">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
      </button>
    </div>
    <div class="top-title">
      DARKROOM
      <span class="meta" id="topMeta">未載入照片</span>
    </div>
    <div class="top-right">
      <button class="icon-btn" id="resetBtn" aria-label="重置">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
      </button>
      <button class="icon-btn primary" id="shareBtn" aria-label="輸出">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
    </div>
  </header>

  <!-- ============ PHOTO STAGE ============ -->
  <main class="photo-stage" id="photoStage">

    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>
      </div>
      <div class="upload-text">點擊載入照片</div>
      <div class="upload-hint">JPG / PNG / HEIC</div>
      <button class="upload-btn" id="uploadBtnMain">選擇照片</button>
    </div>

    <div class="photo-wrap" id="photoWrap">
      <canvas id="photoCanvas"></canvas>
      <div class="filter-tag-overlay" id="filterTag">FILTER: NONE</div>
      <button class="compare-btn" id="compareBtn" aria-label="長按對比原圖">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 2v20"/><path d="M2 12h20"/></svg>
      </button>
      <div class="processing-dot" id="procDot"></div>
    </div>

    <input type="file" id="fileInput" accept="image/*">
  </main>

  <!-- ============ BOTTOM PANEL ============ -->
  <section class="bottom-panel" id="bottomPanel">

    <!-- ===== FILTERS TAB ===== -->
    <div class="tab-content active" id="tab-filters">
      <div class="filter-section-tabs">
        <button class="filter-section-tab active" data-fsection="film">膠片</button>
        <button class="filter-section-tab" data-fsection="trend">流行</button>
      </div>

      <div class="filter-scroll" id="filterScrollFilm">
        <!-- generated by JS -->
      </div>
      <div class="filter-scroll" id="filterScrollTrend" style="display:none;">
        <!-- generated by JS -->
      </div>

      <!-- 濾鏡強度滑桿 -->
      <div class="filter-intensity" id="filterIntensity">
        <div class="intensity-head">
          <div class="intensity-label">
            <span>濾鏡強度</span>
            <span class="filter-name-inline" id="intensityFilterName">—</span>
          </div>
          <div class="intensity-value" id="intensityValue">100%</div>
        </div>
        <div class="intensity-slider-wrap">
          <input type="range" class="intensity-slider" id="intensitySlider" min="0" max="100" value="100" style="--fill: 100%;">
        </div>
      </div>
    </div>

    <!-- ===== ADJUST TAB ===== -->
    <div class="tab-content" id="tab-adjust">
      <div class="adjust-category-bar">
        <button class="adjust-cat active" data-cat="light">光線</button>
        <button class="adjust-cat" data-cat="color">色彩</button>
        <button class="adjust-cat" data-cat="effects">效果</button>
        <button class="adjust-cat" data-cat="detail">細節</button>
      </div>

      <!-- Light -->
      <div class="adjust-sliders active" data-cat="light">
        <div class="pill-row">
          <div class="pill-slider selected" data-slider="exposure">

// ============================================================
// DOM
// ============================================================
const canvas = document.getElementById('photoCanvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const fileInput = document.getElementById('fileInput');
const uploadZone = document.getElementById('uploadZone');
const photoWrap = document.getElementById('photoWrap');
const topMeta = document.getElementById('topMeta');
const filterTag = document.getElementById('filterTag');
const compareBtn = document.getElementById('compareBtn');
const procDot = document.getElementById('procDot');
const bigSlider = document.getElementById('bigSlider');
const bigSliderTitle = document.getElementById('bigSliderTitle');
const bigSliderValue = document.getElementById('bigSliderValue');

// ============================================================
// FILE LOAD
// ============================================================
uploadZone.addEventListener('click', () => fileInput.click());
document.getElementById('uploadBtnMain').addEventListener('click', e => {
  e.stopPropagation();
  fileInput.click();
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadImage(e.target.files[0]);
});

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const maxSide = 1400;
      let w = img.width, h = img.height;
      if (w > maxSide || h > maxSide) {
        const s = maxSide / Math.max(w, h);
        w = Math.round(w * s);
        h = Math.round(h * s);
      }
      canvas.width = w;
      canvas.height = h;
      ctx.drawImage(img, 0, 0, w, h);
      state.image = img;
      state.originalImageData = ctx.getImageData(0, 0, w, h);

      // 縮圖數據（給濾鏡預覽用）
      const thumbCanvas = document.createElement('canvas');
      const tw = 76, th = 76;
      thumbCanvas.width = tw;
      thumbCanvas.height = th;
      const tctx = thumbCanvas.getContext('2d');
      // center crop
      const ratio = Math.max(tw / w, th / h);
      const sw = tw / ratio, sh = th / ratio;
      const sx = (w - sw) / 2, sy = (h - sh) / 2;
      tctx.drawImage(canvas, sx, sy, sw, sh, 0, 0, tw, th);
      state.thumbImageData = tctx.getImageData(0, 0, tw, th);

      uploadZone.style.display = 'none';
      photoWrap.style.display = 'block';
      compareBtn.classList.add('visible');
      topMeta.textContent = `${img.width}×${img.height}`;

      renderFilterThumbs('film');
      renderFilterThumbs('trend');
      applyAll();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ============================================================
// FILTER THUMBNAILS  (render previews with each filter applied)
// ============================================================
function renderFilterThumbs(section) {
  const container = document.getElementById(section === 'film' ? 'filterScrollFilm' : 'filterScrollTrend');
  container.innerHTML = '';
  filterMeta[section].forEach(f => {
    const card = document.createElement('div');
    card.className = 'filter-card';
    if (f.id === state.activeFilter) card.classList.add('active');
    card.dataset.filter = f.id;

    const thumb = document.createElement('div');
    thumb.className = 'filter-thumb';

    if (state.thumbImageData) {
      const tcanvas = document.createElement('canvas');
      tcanvas.width = 76;
      tcanvas.height = 76;
      const tctx = tcanvas.getContext('2d');
      const filteredData = applyFilterToImageData(state.thumbImageData, f.id, {}, 1.0);
      tctx.putImageData(filteredData, 0, 0);
      thumb.appendChild(tcanvas);
    } else {
      const ph = document.createElement('div');
      ph.className = 'filter-thumb-placeholder';
      ph.textContent = f.code;
      thumb.appendChild(ph);
    }

    const name = document.createElement('div');
    name.className = 'filter-name';
    name.textContent = f.name;

    card.appendChild(thumb);
    card.appendChild(name);

    card.addEventListener('click', () => {
      state.activeFilter = f.id;
      // 切換濾鏡時把強度重置為 100%
      state.filterIntensity = 1.0;
      const intensitySlider = document.getElementById('intensitySlider');
      intensitySlider.value = 100;
      intensitySlider.style.setProperty('--fill', '100%');
      document.getElementById('intensityValue').textContent = '100%';
      document.getElementById('intensityFilterName').textContent = f.code;

      document.querySelectorAll('.filter-card').forEach(c => c.classList.remove('active'));
      document.querySelectorAll(`.filter-card[data-filter="${f.id}"]`).forEach(c => c.classList.add('active'));
      filterTag.textContent = `FILTER · ${f.code === 'ORIG' ? 'NONE' : f.code}`;
      filterTag.classList.toggle('visible', f.id !== 'none');

      // 只在選了非「原始」濾鏡時顯示強度滑桿
      document.getElementById('filterIntensity').classList.toggle('visible', f.id !== 'none');

      applyAll();
    });

    container.appendChild(card);
  });
}

// ============================================================
// FILTER SECTION TOGGLE

// ============================================================
// ADJUST CATEGORY SWITCH
// ============================================================
document.querySelectorAll('.adjust-cat').forEach(btn => {
  btn.addEventListener('click', () => {

    document.querySelectorAll('.adjust-sliders').forEach(s => s.classList.remove('active'));

    // 預設選第一個 pill
    const firstPill = document.querySelector(`.adjust-sliders[data-cat="${cat}"] .pill-slider`);
    if (firstPill) selectPill(firstPill);

});

// ============================================================
// PILL SLIDER SELECT
// ============================================================
function selectPill(pill) {
  document.querySelectorAll(`.adjust-sliders.active .pill-slider`).forEach(p => p.classList.remove('selected'));
  pill.classList.add('selected');
  const sliderId = pill.dataset.slider;
  state.selectedSlider = sliderId;
  const meta = sliderMeta[sliderId];
  bigSliderTitle.textContent = meta.label;
  bigSlider.min = meta.min;
  bigSlider.max = meta.max;
  bigSlider.value = state.adjustments[sliderId];
  updateBigSliderValue();

  // toggle center tick visibility (only for symmetric sliders)
  const tick = document.querySelector('.slider-center-tick');
  tick.style.display = meta.min < 0 ? 'block' : 'none';
}

document.querySelectorAll('.pill-slider').forEach(pill => {
  pill.addEventListener('click', () => selectPill(pill));
});

// ============================================================
// BIG SLIDER
// ============================================================
let sliderDebounce;
bigSlider.addEventListener('input', () => {
  const v = parseInt(bigSlider.value);
  state.adjustments[state.selectedSlider] = v;
  updateBigSliderValue();
  updatePillIndicators();
  clearTimeout(sliderDebounce);
  sliderDebounce = setTimeout(applyAll, 20);
});

function updateBigSliderValue() {
  const v = state.adjustments[state.selectedSlider];
  bigSliderValue.textContent = v > 0 ? `+${v}` : `${v}`;
  bigSliderValue.style.color = v !== sliderMeta[state.selectedSlider].def ? 'var(--accent)' : 'var(--ink-mute)';
}

function updatePillIndicators() {
  document.querySelectorAll('.pill-slider').forEach(p => {
    const sid = p.dataset.slider;
    if (!sid) return;
    const v = state.adjustments[sid];
    const def = sliderMeta[sid].def;
    const valEl = p.querySelector('.pill-val');
    if (v !== def) {
      p.classList.add('modified');
      valEl.textContent = v > 0 ? `+${v}` : `${v}`;
    } else {
      p.classList.remove('modified');
      valEl.textContent = '';
    }
  });
}

// ============================================================
// FILTER INTENSITY SLIDER
// ============================================================
const intensitySlider = document.getElementById('intensitySlider');
const intensityValue = document.getElementById('intensityValue');
let intensityDebounce;
intensitySlider.addEventListener('input', () => {
  const v = parseInt(intensitySlider.value);
  state.filterIntensity = v / 100;
  intensityValue.textContent = `${v}%`;
  intensitySlider.style.setProperty('--fill', `${v}%`);
  clearTimeout(intensityDebounce);
  intensityDebounce = setTimeout(applyAll, 20);
});

// ============================================================

let pressTimer;
function startHold() {
  if (!state.image) return;
  state.showOriginal = true;
  compareBtn.classList.add('holding');
  ctx.putImageData(state.originalImageData, 0, 0);
}
function endHold() {
  if (!state.showOriginal) return;
  state.showOriginal = false;
  compareBtn.classList.remove('holding');
  applyAll();
}
compareBtn.addEventListener('pointerdown', startHold);
compareBtn.addEventListener('pointerup', endHold);
compareBtn.addEventListener('pointerleave', endHold);
compareBtn.addEventListener('pointercancel', endHold);

// ============================================================
// TOP BAR ACTIONS
// ============================================================
const modal = document.getElementById('modal');
document.getElementById('moreBtn').addEventListener('click', () => modal.classList.add('show'));
document.getElementById('modalClose').addEventListener('click', () => modal.classList.remove('show'));
modal.addEventListener('click', e => {
  if (e.target === modal) modal.classList.remove('show');
});
document.getElementById('modalLoad').addEventListener('click', () => {
  modal.classList.remove('show');
  fileInput.click();
});
document.getElementById('modalReset').addEventListener('click', () => {
  modal.classList.remove('show');
  resetAll();
});

document.getElementById('resetBtn').addEventListener('click', resetAll);

function resetAll() {
  Object.keys(state.adjustments).forEach(k => {
    state.adjustments[k] = sliderMeta[k].def;
  });
  state.activeFilter = 'none';
  document.querySelectorAll('.filter-card').forEach(c => {
    c.classList.toggle('active', c.dataset.filter === 'none');
  });
  filterTag.classList.remove('visible');
  bigSlider.value = state.adjustments[state.selectedSlider];
  updateBigSliderValue();
  updatePillIndicators();
  applyAll();
  showToast('已重置');
}

document.getElementById('shareBtn').addEventListener('click', () => {
  if (!state.image) {
    showToast('請先載入照片');
    return;
  }
  const link = document.createElement('a');
  link.download = `darkroom_${Date.now()}.jpg`;
  link.href = canvas.toDataURL('image/jpeg', 0.95);
  link.click();
  showToast('已儲存到下載');
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1600);
}

// ============================================================
// CORE: APPLY FILTER + ADJUSTMENTS
// ============================================================
function applyAll() {
  if (!state.originalImageData || state.showOriginal) return;
  procDot.classList.add('show');
  requestAnimationFrame(() => {
    const out = applyFilterToImageData(
      state.originalImageData,
      state.activeFilter,
      state.adjustments,
      state.filterIntensity
    );
    ctx.putImageData(out, 0, 0);

    // 暈影
    if (state.adjustments.vignette > 0) {
      const w = canvas.width, h = canvas.height;
      const strength = state.adjustments.vignette / 100;
      const grd = ctx.createRadialGradient(w/2, h/2, Math.min(w,h)*0.3, w/2, h/2, Math.max(w,h)*0.75);
      grd.addColorStop(0, 'rgba(0,0,0,0)');
      grd.addColorStop(1, `rgba(0,0,0,${strength * 0.85})`);
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, w, h);
    }

    // 顆粒
    if (state.adjustments.grain > 0) {
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const d = imgData.data;
      const intensity = state.adjustments.grain * 0.6;
      for (let i = 0; i < d.length; i += 4) {
        const noise = (Math.random() - 0.5) * intensity;
        d[i] = clamp(d[i] + noise);
        d[i+1] = clamp(d[i+1] + noise);
        d[i+2] = clamp(d[i+2] + noise);
      }
      ctx.putImageData(imgData, 0, 0);
    }

    // CSS濾鏡 for blur/sharpen
    const cssF = [];
    if (state.adjustments.blur > 0) cssF.push(`blur(${state.adjustments.blur/25}px)`);
    if (state.adjustments.sharpen > 0) cssF.push(`contrast(${1 + state.adjustments.sharpen/300}) saturate(${1 + state.adjustments.sharpen/400})`);
    canvas.style.filter = cssF.join(' ');

    procDot.classList.remove('show');
  });
}

function applyFilterToImageData(src, filterId, adj, intensity) {
  // intensity: 0~1，控制濾鏡的色彩變化套用多少。1 = 完整套用，0 = 完全不套
  // 注意:亮度/對比/色溫等「使用者滑桿」的調整不受 intensity 影響，
  // 只有「濾鏡 preset 帶來的色彩偏移」才受 intensity 影響。
  if (intensity === undefined) intensity = 1.0;

  const out = new ImageData(
    new Uint8ClampedArray(src.data),
    src.width,
    src.height
  );
  const sd = src.data, od = out.data;
  const preset = filterPresets[filterId] || filterPresets['none'];
  const extras = preset.extras || {};
  const hasFilter = filterId !== 'none';
  const k = hasFilter ? intensity : 0;  // 濾鏡實際生效強度

  // 使用者滑桿:完整套用
  const userBrightness = adj.brightness || 0;
  const userContrast = adj.contrast || 0;
  const userExposure = adj.exposure || 0;
  const userSaturation = adj.saturation || 0;
  const userTemp = adj.temperature || 0;
  const userTint = adj.tint || 0;
  const userShadows = (adj.shadows || 0) / 100;
  const userHighlights = (adj.highlights || 0) / 100;

  // 濾鏡 preset 的附加值:乘上 k
  const filterBrightness = (extras.exposure || 0) * 0.6 * k;
  const filterContrast = (extras.contrast || 0) * k;
  const filterSaturation = (extras.saturation || 0) * k;
  const filterWarmth = (extras.warmth || 0) * k;
  const filterFade = ((extras.fade || 0) / 100) * k;

  // 合併
  const brightness = userBrightness + filterBrightness;
  const contrastVal = userContrast + filterContrast;
  const contrastF = (contrastVal + 100) / 100;
  const exposureF = Math.pow(2, userExposure / 100);
  const saturationF = 1 + (userSaturation + filterSaturation) / 100;
  const warmth = userTemp + filterWarmth;
  const tintVal = userTint;
  const fade = filterFade;

  const isBW = preset.curve === 'bw';
  const len = sd.length;

  for (let i = 0; i < len; i += 4) {
    let r = sd[i], g = sd[i+1], b = sd[i+2];

    r *= exposureF; g *= exposureF; b *= exposureF;
    r += brightness; g += brightness; b += brightness;
    r = (r - 128) * contrastF + 128;
    g = (g - 128) * contrastF + 128;
    b = (b - 128) * contrastF + 128;
    r += warmth * 0.4;
    b -= warmth * 0.4;
    g += tintVal * 0.3;
    r -= tintVal * 0.15;
    b -= tintVal * 0.15;

    const lum = (r * 0.299 + g * 0.587 + b * 0.114) / 255;
    const shadowMask = Math.pow(1 - lum, 2);
    const highlightMask = Math.pow(lum, 2);
    r += userShadows * 50 * shadowMask + userHighlights * 50 * highlightMask;
    g += userShadows * 50 * shadowMask + userHighlights * 50 * highlightMask;
    b += userShadows * 50 * shadowMask + userHighlights * 50 * highlightMask;

    const gray = r * 0.299 + g * 0.587 + b * 0.114;
    r = gray + (r - gray) * saturationF;
    g = gray + (g - gray) * saturationF;
    b = gray + (b - gray) * saturationF;

    // 濾鏡的三段色偏:乘 k
    if (hasFilter && preset.r) {
      const sw = Math.max(0, 1 - lum * 2);
      const mw = 1 - Math.abs(lum - 0.5) * 2;
      const hw = Math.max(0, lum * 2 - 1);
      r += (preset.r[0]*sw + preset.r[1]*mw + preset.r[2]*hw) * k;
      g += (preset.g[0]*sw + preset.g[1]*mw + preset.g[2]*hw) * k;
      b += (preset.b[0]*sw + preset.b[1]*mw + preset.b[2]*hw) * k;
    }

    // 黑白:用 k 在彩色與黑白之間插值
    if (isBW && k > 0) {
      const v = r * 0.299 + g * 0.587 + b * 0.114;
      r = r * (1 - k) + v * k;
      g = g * (1 - k) + v * k;
      b = b * (1 - k) + v * k;
    }

    if (fade > 0) {
      r = r * (1 - fade) + 128 * fade;
      g = g * (1 - fade) + 128 * fade;
      b = b * (1 - fade) + 128 * fade;
    }

    // 曲線:用 k 在原值與曲線結果之間插值
    if (hasFilter && k > 0) {
      let cr = r, cg = g, cb = b;
      if (preset.curve === 'cinema') {
        if (r < 60) cr = r * 0.85 + 8;
        if (g < 60) cg = g * 0.85 + 8;
        if (b < 60) cb = b * 0.85 + 8;
      } else if (preset.curve === 'punchy') {
        cr = (r - 128) * 1.12 + 128;
        cg = (g - 128) * 1.12 + 128;
        cb = (b - 128) * 1.12 + 128;
      } else if (preset.curve === 'soft') {
        cr = r * 0.92 + 18; cg = g * 0.92 + 18; cb = b * 0.92 + 18;
      } else if (preset.curve === 'film') {
        cr = filmCurve(r); cg = filmCurve(g); cb = filmCurve(b);
      } else if (preset.curve === 'fade') {
        cr = r * 0.85 + 28; cg = g * 0.85 + 28; cb = b * 0.85 + 28;
      }
      r = r * (1 - k) + cr * k;
      g = g * (1 - k) + cg * k;
      b = b * (1 - k) + cb * k;
    }

    od[i]   = clamp(r);
    od[i+1] = clamp(g);
    od[i+2] = clamp(b);
    od[i+3] = sd[i+3];
  }
  return out;
}

function filmCurve(v) {
  const n = v / 255;
  const c = n < 0.5 ? 2*n*n : 1 - Math.pow(-2*n + 2, 2)/2;
  return c * 255;
}
function clamp(v) { return v < 0 ? 0 : v > 255 ? 255 : v; }

// 初始化:預設選 exposure
selectPill(document.querySelector('.pill-slider[data-slider="exposure"]'));
</script>
